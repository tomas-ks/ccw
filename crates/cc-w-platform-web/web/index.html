<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>w web viewer</title>
    <link rel="stylesheet" href="./vendor/xterm.css" />
    <style>
      :root {
        color-scheme: dark;
        font-family: Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
        background: #0f1320;
        color: #f3f6ff;
        --side-panel-width: 648px;
        --terminal-height: 220px;
        --resizer-size: 10px;
      }

      * {
        box-sizing: border-box;
      }

      [hidden] {
        display: none !important;
      }

      body {
        margin: 0;
        height: 100vh;
        display: flex;
        flex-direction: column;
        overflow: hidden;
        background: #0f1320;
        color: #f3f6ff;
      }

      body.is-resizing {
        user-select: none;
      }

      body.is-resizing.horizontal {
        cursor: row-resize;
      }

      body.is-resizing.vertical {
        cursor: col-resize;
      }

      .visually-hidden {
        position: absolute;
        width: 1px;
        height: 1px;
        padding: 0;
        margin: -1px;
        overflow: hidden;
        clip: rect(0, 0, 0, 0);
        white-space: nowrap;
        border: 0;
      }

      code {
        font-family: ui-monospace, SFMono-Regular, SF Mono, Menlo, Monaco, Consolas, "Liberation Mono", monospace;
        font-size: 0.94em;
      }

      .viewer-header {
        flex: 0 0 auto;
        min-height: 34px;
        display: flex;
        align-items: center;
        justify-content: space-between;
        gap: 12px;
        padding: 5px 12px;
        background: #151b2a;
        border-bottom: 1px solid rgba(255, 255, 255, 0.08);
      }

      .header-tools,
      .header-actions {
        display: flex;
        align-items: center;
        gap: 8px;
      }

      .icon-button {
        width: 28px;
        height: 24px;
        display: inline-flex;
        align-items: center;
        justify-content: center;
        padding: 0;
        border: 1px solid rgba(255, 255, 255, 0.12);
        border-radius: 6px;
        background: #101622;
        color: rgba(243, 246, 255, 0.72);
        cursor: pointer;
      }

      .icon-button:hover {
        color: #f3f6ff;
        border-color: rgba(141, 182, 255, 0.32);
      }

      .icon-button.active,
      .icon-button[aria-pressed="true"] {
        color: #f3f6ff;
        background: #203052;
        border-color: rgba(141, 182, 255, 0.54);
      }

      .icon-button svg {
        width: 16px;
        height: 16px;
        display: block;
        fill: none;
        stroke: currentColor;
        stroke-width: 1.8;
        stroke-linecap: round;
        stroke-linejoin: round;
      }

      .viewer-footer {
        flex: 0 0 auto;
        min-height: 34px;
        display: flex;
        align-items: center;
        gap: 12px;
        padding: 5px 12px;
        background: #151b2a;
        border-top: 1px solid rgba(255, 255, 255, 0.08);
      }

      .viewer-footer label {
        display: flex;
        align-items: center;
        gap: 6px;
        font-size: 12px;
        color: rgba(243, 246, 255, 0.72);
        white-space: nowrap;
      }

      .viewer-footer select {
        height: 24px;
        min-width: 148px;
        max-width: 280px;
        border: 1px solid rgba(255, 255, 255, 0.12);
        border-radius: 6px;
        background: #0f1320;
        color: inherit;
        padding: 0 8px;
        font: inherit;
      }

      .status {
        min-width: 0;
        flex: 1 1 auto;
        font-size: 12px;
        color: rgba(243, 246, 255, 0.68);
        overflow: hidden;
        text-overflow: ellipsis;
        white-space: nowrap;
      }

      .workspace {
        flex: 1;
        min-height: 0;
        display: flex;
        min-width: 0;
        overflow: hidden;
      }

      .viewer-pane {
        flex: 1;
        min-width: 0;
        min-height: 0;
        display: flex;
      }

      .viewport {
        position: relative;
        flex: 1;
        min-height: 320px;
        overflow: hidden;
        background: #0f1320;
      }

      #viewer-canvas,
      #axes-overlay {
        position: absolute;
        inset: 0;
        display: block;
        width: 100%;
        height: 100%;
      }

      #viewer-canvas {
        background: #0f1320;
        touch-action: none;
      }

      #axes-overlay {
        pointer-events: none;
      }

      .side-panel {
        width: var(--side-panel-width);
        min-width: 420px;
        min-height: 0;
        display: grid;
        grid-template-rows: 1fr;
        overflow: hidden;
        background: #121827;
        border-left: 1px solid rgba(255, 255, 255, 0.08);
      }

      body.graph-hidden .side-panel,
      body.graph-hidden #side-panel-resizer {
        display: none;
      }

      body.terminal-hidden .terminal,
      body.terminal-hidden #terminal-resizer {
        display: none;
      }

      .splitter {
        position: relative;
        flex: 0 0 auto;
        background: transparent;
        touch-action: none;
      }

      .splitter::before {
        content: "";
        position: absolute;
        inset: 0;
        transition: background-color 120ms ease;
      }

      .splitter:hover::before,
      .splitter.active::before {
        background: rgba(141, 182, 255, 0.22);
      }

      .splitter.vertical {
        width: var(--resizer-size);
        cursor: col-resize;
      }

      .splitter.vertical::before {
        left: 50%;
        width: 1px;
        transform: translateX(-50%);
        background: rgba(255, 255, 255, 0.08);
      }

      .splitter.horizontal {
        height: var(--resizer-size);
        cursor: row-resize;
      }

      .splitter.horizontal::before {
        top: 50%;
        height: 1px;
        transform: translateY(-50%);
        background: rgba(255, 255, 255, 0.08);
      }

      .panel-tabs {
        display: flex;
        gap: 18px;
        padding: 0 16px;
        height: 48px;
        align-items: end;
        border-bottom: 1px solid rgba(255, 255, 255, 0.08);
        background: #151b2a;
      }

      .panel-tab {
        height: 36px;
        padding: 0;
        border: none;
        border-bottom: 2px solid transparent;
        border-radius: 0;
        background: transparent;
        color: rgba(243, 246, 255, 0.68);
        font: inherit;
        font-size: 13px;
        font-weight: 600;
        cursor: pointer;
      }

      .panel-tab:hover {
        color: #f3f6ff;
      }

      .panel-tab.active {
        color: #f3f6ff;
        border-bottom-color: #8db6ff;
      }

      .side-panel-body {
        min-height: 0;
        position: relative;
      }

      .side-panel-view {
        display: none;
        flex-direction: column;
        height: 100%;
        min-height: 0;
      }

      .side-panel-view.active {
        display: flex;
      }

      .properties-actions {
        min-height: 40px;
        display: flex;
        align-items: center;
        justify-content: space-between;
        gap: 12px;
        padding: 7px 12px;
        border-bottom: 1px solid rgba(255, 255, 255, 0.08);
      }

      .ui-button {
        height: 28px;
        border: 1px solid rgba(255, 255, 255, 0.12);
        border-radius: 6px;
        background: #172033;
        color: #f3f6ff;
        padding: 0 10px;
        font: inherit;
        font-size: 12px;
        cursor: pointer;
      }

      .ui-button:disabled {
        opacity: 0.45;
        cursor: default;
      }

      .toolbar-actions {
        display: flex;
        align-items: center;
        gap: 8px;
      }

      .graph-status {
        color: rgba(243, 246, 255, 0.72);
      }

      .graph-floating-button {
        position: absolute;
        right: 10px;
        bottom: 10px;
        z-index: 5;
        width: 26px;
        height: 24px;
        background: rgba(16, 22, 34, 0.86);
        backdrop-filter: blur(6px);
      }

      .graph-floating-button:disabled {
        opacity: 0.45;
        cursor: default;
        border-color: rgba(255, 255, 255, 0.08);
      }

      .graph-floating-button:focus:not(:focus-visible) {
        outline: none;
      }

      .graph-status[data-tone="warn"] {
        color: #f2c879;
      }

      .graph-status[data-tone="error"] {
        color: #ffb8aa;
      }

      .graph-shell {
        position: relative;
        flex: 1;
        min-height: 0;
        overflow: hidden;
        background: #20242c;
      }

      .graph-view,
      .graph-fallback-list {
        position: absolute;
        inset: 0;
      }

      .graph-view {
        background: #20242c;
      }

      .graph-fallback-list {
        overflow: auto;
        padding: 10px 12px 18px;
      }

      .graph-fallback-row {
        width: 100%;
        padding: 10px 12px;
        border: none;
        border-bottom: 1px solid rgba(255, 255, 255, 0.06);
        background: transparent;
        color: inherit;
        text-align: left;
        cursor: pointer;
      }

      .graph-fallback-row:hover,
      .graph-fallback-row.active {
        background: rgba(141, 182, 255, 0.12);
      }

      .graph-fallback-row strong {
        display: block;
        font-size: 13px;
        font-weight: 600;
      }

      .graph-fallback-row span {
        display: block;
        margin-top: 4px;
        font-size: 12px;
        color: rgba(243, 246, 255, 0.68);
      }

      .properties-header {
        padding: 14px;
        border-bottom: 1px solid rgba(255, 255, 255, 0.08);
      }

      .properties-balloon {
        position: absolute;
        z-index: 20;
        --arrow-y: 50%;
        width: min(308px, calc(100% - 24px));
        max-height: min(420px, calc(100% - 24px));
        display: flex;
        flex-direction: column;
        overflow: visible;
        border: 1px solid rgba(255, 255, 255, 0.12);
        border-radius: 8px;
        background: rgba(18, 24, 39, 0.88);
        box-shadow: 0 18px 38px rgba(0, 0, 0, 0.32);
        backdrop-filter: blur(10px);
        pointer-events: none;
      }

      .properties-balloon[hidden] {
        display: none;
      }

      .properties-balloon::before,
      .properties-balloon::after {
        content: "";
        position: absolute;
        top: var(--arrow-y);
        width: 0;
        height: 0;
        transform: translateY(-50%);
      }

      .properties-balloon::before {
        filter: drop-shadow(0 2px 3px rgba(0, 0, 0, 0.28));
      }

      .properties-balloon[data-side="right"]::before {
        left: -14px;
        border-top: 10px solid transparent;
        border-bottom: 10px solid transparent;
        border-right: 14px solid rgba(255, 255, 255, 0.13);
      }

      .properties-balloon[data-side="right"]::after {
        left: -11px;
        border-top: 8px solid transparent;
        border-bottom: 8px solid transparent;
        border-right: 11px solid rgba(18, 24, 39, 0.88);
      }

      .properties-balloon[data-side="left"]::before {
        right: -14px;
        border-top: 10px solid transparent;
        border-bottom: 10px solid transparent;
        border-left: 14px solid rgba(255, 255, 255, 0.13);
      }

      .properties-balloon[data-side="left"]::after {
        right: -11px;
        border-top: 8px solid transparent;
        border-bottom: 8px solid transparent;
        border-left: 11px solid rgba(18, 24, 39, 0.88);
      }

      .properties-balloon[data-side="center"]::before,
      .properties-balloon[data-side="center"]::after {
        display: none;
      }

      .properties-balloon .properties-header {
        padding: 12px 14px;
        overflow: hidden;
        border-top-left-radius: 8px;
        border-top-right-radius: 8px;
      }

      .properties-balloon .properties-title {
        font-size: 15px;
      }

      .properties-title {
        display: flex;
        align-items: center;
        gap: 7px;
      }

      .properties-title-text {
        min-width: 0;
        overflow: hidden;
        text-overflow: ellipsis;
      }

      .properties-graph-button {
        width: 22px;
        height: 22px;
        flex: 0 0 auto;
        display: inline-flex;
        align-items: center;
        justify-content: center;
        padding: 0;
        border: 1px solid rgba(141, 182, 255, 0.24);
        border-radius: 6px;
        background: rgba(141, 182, 255, 0.08);
        color: rgba(243, 246, 255, 0.76);
        cursor: pointer;
        pointer-events: auto;
      }

      .properties-graph-button:hover {
        color: #f3f6ff;
        border-color: rgba(141, 182, 255, 0.48);
        background: rgba(141, 182, 255, 0.14);
      }

      .properties-graph-button svg {
        width: 14px;
        height: 14px;
        display: block;
        fill: none;
        stroke: currentColor;
        stroke-width: 1.8;
        stroke-linecap: round;
        stroke-linejoin: round;
      }

      .properties-balloon .properties-subtitle {
        font-size: 12px;
      }

      .properties-close {
        position: absolute;
        top: 9px;
        right: 9px;
        width: 24px;
        height: 24px;
        border: 1px solid rgba(255, 255, 255, 0.1);
        border-radius: 6px;
        background: rgba(255, 255, 255, 0.04);
        color: rgba(243, 246, 255, 0.72);
        cursor: pointer;
        pointer-events: auto;
      }

      .properties-close:hover {
        color: #f3f6ff;
        border-color: rgba(141, 182, 255, 0.34);
      }

      body.viewer-dragging .properties-close,
      body.viewer-dragging .properties-graph-button {
        pointer-events: none;
      }

      .pick-anchor-marker {
        position: absolute;
        z-index: 19;
        width: 12px;
        height: 12px;
        border: 2px solid #f3f6ff;
        border-radius: 999px;
        background: #8db6ff;
        box-shadow: 0 0 0 5px rgba(141, 182, 255, 0.18), 0 8px 18px rgba(0, 0, 0, 0.28);
        transform: translate(-50%, -50%);
        pointer-events: none;
      }

      .properties-kicker {
        margin: 0 0 6px;
        font-size: 12px;
        color: rgba(243, 246, 255, 0.58);
        text-transform: uppercase;
        letter-spacing: 0.04em;
      }

      .properties-title {
        margin: 0;
        font-size: 18px;
        line-height: 1.3;
      }

      .properties-subtitle {
        margin: 8px 0 0;
        font-size: 13px;
        color: rgba(243, 246, 255, 0.72);
      }

      .properties-content {
        flex: 1;
        min-height: 0;
        overflow: auto;
        padding: 14px;
        display: flex;
        flex-direction: column;
        gap: 18px;
      }

      .properties-empty {
        font-size: 13px;
        color: rgba(243, 246, 255, 0.72);
      }

      .properties-section {
        display: flex;
        flex-direction: column;
        gap: 10px;
      }

      .properties-section h3 {
        margin: 0;
        font-size: 13px;
        font-weight: 600;
      }

      .property-grid {
        display: grid;
        grid-template-columns: minmax(94px, auto) 1fr;
        gap: 8px 12px;
        align-items: start;
      }

      .property-label {
        font-size: 12px;
        color: rgba(243, 246, 255, 0.6);
      }

      .property-value {
        font-size: 12px;
        color: #f3f6ff;
        word-break: break-word;
      }

      .relation-list {
        display: flex;
        flex-direction: column;
        gap: 8px;
      }

      .relation-row {
        padding-bottom: 8px;
        border-bottom: 1px solid rgba(255, 255, 255, 0.06);
      }

      .relation-row:last-child {
        padding-bottom: 0;
        border-bottom: none;
      }

      .relation-row strong {
        display: block;
        font-size: 12px;
      }

      .relation-row span {
        display: block;
        margin-top: 3px;
        font-size: 12px;
        color: rgba(243, 246, 255, 0.68);
      }

      .terminal {
        flex: 0 0 var(--terminal-height);
        height: var(--terminal-height);
        min-height: 0;
        display: flex;
        overflow: hidden;
        background: #0d1117;
      }

      .terminal-tools {
        display: flex;
        flex-direction: column;
        align-items: center;
        gap: 6px;
        flex: 0 0 auto;
        width: 40px;
        padding: 6px 0;
      }

      .terminal-close-button {
        width: 24px;
        height: 22px;
        margin: 0 auto 8px;
        flex: 0 0 auto;
      }

      .terminal-close-button svg {
        width: 14px;
        height: 14px;
      }

      .terminal-tool-tab {
        height: 36px;
        width: 36px;
        padding: 0;
        border: none;
        border-bottom: 2px solid transparent;
        border-radius: 0;
        background: transparent;
        color: rgba(243, 246, 255, 0.72);
        font: inherit;
        font-size: 12px;
        font-weight: 700;
        cursor: pointer;
        text-align: center;
      }

      .terminal-tool-tab:hover {
        color: #f3f6ff;
      }

      .terminal-tool-tab.active {
        color: #f3f6ff;
        border-bottom-color: #8db6ff;
      }

      .terminal-screen {
        min-height: 0;
        min-width: 0;
        display: grid;
        grid-template-columns: 40px 1fr;
        gap: 8px;
        flex: 1;
        overflow: hidden;
        padding: 8px 12px 12px;
        background: #0d1117;
      }

      .terminal-side {
        min-height: 0;
        grid-row: 1;
        display: flex;
        flex-direction: column;
        align-items: stretch;
        justify-content: flex-start;
        background: #0c1018;
        border-right: 1px solid rgba(255, 255, 255, 0.04);
        padding-top: 8px;
      }

      .terminal-host {
        position: relative;
        grid-column: 2;
        grid-row: 1;
        min-width: 0;
        min-height: 0;
        overflow: hidden;
        background: #0c1018;
        font: 12px/1.5 ui-monospace, SFMono-Regular, SF Mono, Menlo, Monaco, Consolas, "Liberation Mono", monospace;
        display: none;
      }

      .terminal-host.active {
        display: block;
      }

      .agent-capability-controls {
        flex: 0 1 auto;
        margin-left: auto;
        min-width: 0;
        display: flex;
        align-items: center;
        justify-content: flex-end;
        gap: 8px;
        color: rgba(243, 246, 255, 0.52);
        font-size: 12px;
      }

      .agent-capability-controls label {
        display: inline-flex;
        align-items: center;
        gap: 5px;
        white-space: nowrap;
      }

      .agent-capability-controls select {
        height: 24px;
        min-width: 112px;
        max-width: 190px;
        border: 1px solid rgba(141, 182, 255, 0.2);
        border-radius: 6px;
        background: #101622;
        color: rgba(243, 246, 255, 0.78);
        font: inherit;
        padding: 0 20px 0 6px;
      }

      .agent-capability-controls select:disabled {
        color: rgba(243, 246, 255, 0.36);
        border-color: rgba(255, 255, 255, 0.08);
      }

      .terminal-host .xterm {
        height: 100%;
      }

      .terminal-host .xterm-viewport {
        background-color: #0c1018 !important;
        overflow-y: auto !important;
        scrollbar-color: rgba(255, 255, 255, 0.18) #0c1018;
      }

      .terminal-host .xterm-screen {
        width: 100% !important;
      }

      .terminal-host .xterm-viewport::-webkit-scrollbar {
        width: 10px;
      }

      .terminal-host .xterm-viewport::-webkit-scrollbar-track {
        background: #0c1018;
      }

      .terminal-host .xterm-viewport::-webkit-scrollbar-thumb {
        background: rgba(255, 255, 255, 0.16);
        border-radius: 999px;
      }

      .terminal-host .xterm .xterm-selection div {
        border-radius: 2px;
      }

      @media (max-width: 900px) {
        .viewer-header {
          min-height: 34px;
          padding: 5px 8px;
        }

        .viewer-footer {
          height: auto;
          min-height: 34px;
          padding: 5px 8px;
          flex-wrap: wrap;
        }

        .viewer-footer select {
          min-width: 132px;
        }

        .agent-capability-controls {
          order: 3;
        }

        .status {
          order: 4;
          flex-basis: 100%;
        }

        .terminal {
          height: var(--terminal-height);
        }

        .terminal-screen {
          padding: 8px 10px;
        }
      }
    </style>
  </head>
  <body class="graph-hidden terminal-hidden">
    <header class="viewer-header" aria-label="Viewer tools">
      <div class="header-tools" role="toolbar" aria-label="3D tools">
        <select id="tool-picker" class="visually-hidden" aria-label="Active 3D tools">
          <option value="none">No tools</option>
          <option value="orbit">Rotate</option>
          <option value="pick">Pick</option>
          <option value="orbit-pick" selected>Rotate and pick</option>
        </select>
        <button
          class="icon-button tool-button active"
          data-tool-button="orbit"
          type="button"
          aria-label="Rotate model"
          aria-pressed="true"
          title="Rotate"
        >
          <svg viewBox="0 0 24 24" aria-hidden="true">
            <path d="M20 11a8 8 0 1 0-2.3 5.7" />
            <path d="M20 5v6h-6" />
          </svg>
        </button>
        <button
          class="icon-button tool-button active"
          data-tool-button="pick"
          type="button"
          aria-label="Pick model elements"
          aria-pressed="true"
          title="Pick"
        >
          <svg viewBox="0 0 24 24" aria-hidden="true">
            <path d="M12 4v5" />
            <path d="M12 15v5" />
            <path d="M4 12h5" />
            <path d="M15 12h5" />
            <circle cx="12" cy="12" r="2.8" />
          </svg>
        </button>
      </div>
      <div class="header-actions" aria-label="Viewer panels">
        <button
          class="icon-button terminal-toggle-button"
          id="terminal-toggle-button"
          type="button"
          aria-label="Toggle terminal panel"
          aria-pressed="false"
          title="Terminal"
        >
          <svg viewBox="0 0 24 24" aria-hidden="true">
            <rect x="4" y="5" width="16" height="14" rx="2" />
            <path d="M7.5 9.5l3 2.5-3 2.5" />
            <path d="M12.5 15h4" />
          </svg>
        </button>
        <button
          class="icon-button graph-toggle-button"
          id="graph-toggle-button"
          type="button"
          aria-label="Toggle graph viewport"
          aria-pressed="false"
          title="Graph"
        >
          <svg viewBox="0 0 24 24" aria-hidden="true">
            <circle cx="6" cy="7" r="2.4" />
            <circle cx="17" cy="6" r="2.4" />
            <circle cx="18" cy="17" r="2.4" />
            <circle cx="7" cy="18" r="2.4" />
            <path d="M8.2 7h6.4" />

      function safeViewerCurrentResource(viewer) {
        try {
          return viewer.currentResource();

      function isIfcResource(resource) {
        return typeof resource === "string" && resource.startsWith("ifc/");
      }

      function isProjectResource(resource) {
        return typeof resource === "string" && resource.startsWith("project/");
      }

      function isKnownResource(resource) {
        return isIfcResource(resource) || isProjectResource(resource);
      }

      function parseSourceScopedSemanticId(value) {
        const text = String(value ?? "").trim();
        const separator = text.indexOf("::");
        if (separator <= 0) {
          return null;
        }
        const sourceResource = text.slice(0, separator).trim();
        const semanticId = text.slice(separator + 2).trim();
        if (!semanticId || !isIfcResource(sourceResource)) {
          return null;
        }
        return { sourceResource, semanticId };
      }

      function sourceScopedSemanticId(sourceResource, semanticId) {
        return `${sourceResource}::${semanticId}`;
      }

      function actionSourceResource(options = {}) {
        if (typeof options === "string") {
          return options.trim();
        }
        const raw =
          options?.sourceResource ??
          options?.source_resource ??
          options?.resource ??
          options?.ifcResource ??
          "";
        return String(raw || "").trim();
      }

      function semanticIdsForViewerResource(ids, viewerResource, options = {}) {
        const values = Array.isArray(ids) ? ids : [ids];
        const actionResource = actionSourceResource(options);
        const currentResource = isKnownResource(viewerResource) ? viewerResource : "";
        const normalized = [];
        const seen = new Set();
        for (const value of values) {
          const text = String(value ?? "").trim();
          if (!text) {
            continue;
          }
          const scoped = parseSourceScopedSemanticId(text);
          let semanticId = text;
          if (scoped) {
            if (isProjectResource(currentResource)) {
              if (isIfcResource(actionResource) && actionResource !== scoped.sourceResource) {
                continue;
              }
              semanticId = sourceScopedSemanticId(scoped.sourceResource, scoped.semanticId);
            } else if (isIfcResource(currentResource)) {
              if (scoped.sourceResource !== currentResource) {
                continue;
              }
              semanticId = scoped.semanticId;
            } else {
              continue;
            }
          } else if (isProjectResource(currentResource)) {
            if (!isIfcResource(actionResource)) {
              continue;
            }
            semanticId = sourceScopedSemanticId(actionResource, text);
          } else if (isIfcResource(currentResource)) {
            if (isIfcResource(actionResource) && actionResource !== currentResource) {
              continue;
            }
            if (isProjectResource(actionResource)) {
              continue;
            }
          } else {
            continue;
          }
          if (!seen.has(semanticId)) {
            seen.add(semanticId);
            normalized.push(semanticId);
          }
        }
        return normalized;
      }

      function scopedSemanticIdForViewer(semanticId, sourceResource, viewerResource) {
        return (
          semanticIdsForViewerResource([semanticId], viewerResource, { sourceResource })[0] ||
          null
        );
      }

      function projectResourceForIfc(resource) {
        if (!isIfcResource(resource)) {
          return null;
        }
        if (resource.startsWith("ifc/building-")) {
          return "project/building";
        }
        if (resource.startsWith("ifc/infra-")) {

        const ifcResource = selectedIfcResource(viewer, explicitResource);
        const projectResource = projectResourceForIfc(ifcResource);
        return projectResource && resourcePickerHasOption(projectResource)
          ? projectResource
          : ifcResource;

      function sanitizeTerminalText(text) {
        return String(text).replace(/\x1b/g, "\\x1b");

      function terminalAnsiRgb([r, g, b]) {
        return `\x1b[38;2;${r};${g};${b}m`;

      function terminalAnsiWrap(text, rgb, { bold = false, dim = false } = {}) {
        const open = `${bold ? "\x1b[1m" : ""}${dim ? "\x1b[2m" : ""}${terminalAnsiRgb(rgb)}`;
        return `${open}${sanitizeTerminalText(text)}\x1b[0m`;
      }

      function terminalAssistantMarkup(text) {
        const source = String(text);
        const parts = [];
        let cursor = 0;
        const boldPattern = /\*\*([^*\r\n](?:.*?[^*\r\n])?)\*\*/g;
        for (const match of source.matchAll(boldPattern)) {
          const start = match.index ?? 0;
          if (start > cursor) {
            parts.push(sanitizeTerminalText(source.slice(cursor, start)));
          }
          parts.push(`\x1b[1m${sanitizeTerminalText(match[1])}\x1b[22m`);
          cursor = start + match[0].length;
        }
        if (cursor < source.length) {
          parts.push(sanitizeTerminalText(source.slice(cursor)));
        }
        return parts.join("");
      }

        const onTerminalResize =
          typeof callbacks.onTerminalResize === "function" ? callbacks.onTerminalResize : () => {};
        let refreshFrame = 0;

        const runPaneRefresh = () => {

          onSidePanelResize();

        const schedulePaneRefresh = ({ immediate = false } = {}) => {
          if (refreshFrame) {

              return;

            cancelAnimationFrame(refreshFrame);

          if (immediate) {

          const minWidth = 420;
          const minViewportWidth = 320;
          const maxWidth = Math.max(minWidth, workspaceRect.width - minViewportWidth);
          return clamp(width, minWidth, maxWidth);
        };

        const constrainTerminalHeight = (height) => {
          const headerHeight = header ? header.getBoundingClientRect().height : 34;
          const footerHeight = footer ? footer.getBoundingClientRect().height : 34;
          const minHeight = 132;
          const minWorkspaceHeight = 260;
          const maxHeight = Math.max(
            minHeight,
            window.innerHeight - headerHeight - footerHeight - minWorkspaceHeight
          );
          return clamp(height, minHeight, maxHeight);
        };

        const syncResizerAria = () => {
          sidePanelResizer.setAttribute(
            "aria-valuenow",
            String(Math.round(sidePanel.getBoundingClientRect().width))
          );
          terminalResizer.setAttribute(
            "aria-valuenow",
            String(Math.round(terminal.getBoundingClientRect().height))
          );
        };

        const beginDrag = (resizer, axis, onMove) => {
          const activeClass = axis === "vertical" ? "vertical" : "horizontal";

          const stop = () => {
            body.classList.remove("is-resizing", activeClass);
            resizer.classList.remove("active");
            window.removeEventListener("pointermove", move);
            window.removeEventListener("pointerup", stop);
            window.removeEventListener("pointercancel", stop);
            syncResizerAria();
            schedulePaneRefresh({ immediate: true });
          };

          const move = (event) => {
            onMove(event);
          };

          return (event) => {
            event.preventDefault();
            body.classList.add("is-resizing", activeClass);
            resizer.classList.add("active");
            syncResizerAria();
            window.addEventListener("pointermove", move);
            window.addEventListener("pointerup", stop);
            window.addEventListener("pointercancel", stop);
          };
        };

        sidePanelResizer.addEventListener(
          "pointerdown",
          beginDrag(sidePanelResizer, "vertical", (event) => {
            const workspaceRect = workspace.getBoundingClientRect();
            const nextWidth = constrainSidePanelWidth(workspaceRect.right - event.clientX);
            applySidePanelWidth(nextWidth);
            syncResizerAria();
            schedulePaneRefresh();
          })
        );

        terminalResizer.addEventListener(
          "pointerdown",
          beginDrag(terminalResizer, "horizontal", (event) => {
            const nextHeight = constrainTerminalHeight(window.innerHeight - event.clientY);
            applyTerminalHeight(nextHeight);
            syncResizerAria();
            schedulePaneRefresh();
          })
        );

        window.addEventListener("resize", () => {
          applySidePanelWidth(constrainSidePanelWidth(sidePanel.getBoundingClientRect().width));
          if (!body.classList.contains("terminal-hidden")) {
            applyTerminalHeight(constrainTerminalHeight(terminal.getBoundingClientRect().height));
          }
          syncResizerAria();
          schedulePaneRefresh();
        });

        applySidePanelWidth(constrainSidePanelWidth(sidePanel.getBoundingClientRect().width));
        applyTerminalHeight(constrainTerminalHeight(terminal.getBoundingClientRect().height));
        syncResizerAria();
        schedulePaneRefresh({ immediate: true });
      }

      function installHeaderControls(viewer, graphShell) {
        const toolPicker = document.getElementById("tool-picker");
        const toolButtons = Array.from(document.querySelectorAll("[data-tool-button]"));
        const graphToggleButton = document.getElementById("graph-toggle-button");
        const terminalToggleButton = document.getElementById("terminal-toggle-button");
        const terminalCloseButton = document.getElementById("terminal-close-button");
        const activeTools = () => parseViewerToolValue(toolPicker?.value || "none");

        const syncToolButtons = () => {
          const nextTools = activeTools();
          const nextTool = viewerToolsToPickerValue(nextTools);
          for (const button of toolButtons) {
            const active = Boolean(nextTools[button.dataset.toolButton]);
            button.classList.toggle("active", active);
            button.setAttribute("aria-pressed", String(active));
          }
          window.dispatchEvent(
            new CustomEvent("w-viewer-tool-change", {
              detail: { tool: nextTool, tools: nextTools },
            })
          );
        };

        for (const button of toolButtons) {
          button.addEventListener("click", () => {
            if (!toolPicker) {
              return;
            }
            const nextTools = activeTools();
            const tool = button.dataset.toolButton;
            if (tool === "orbit" || tool === "pick") {
              nextTools[tool] = !nextTools[tool];
            }
            toolPicker.value = viewerToolsToPickerValue(nextTools);
            toolPicker.dispatchEvent(new Event("change", { bubbles: true }));
          });
        }
        toolPicker?.addEventListener("change", syncToolButtons);
        syncToolButtons();

        const setGraphVisible = (visible) => {
          document.body.classList.toggle("graph-hidden", !visible);
          graphToggleButton?.classList.toggle("active", visible);
          graphToggleButton?.setAttribute("aria-pressed", String(visible));
          requestAnimationFrame(() => {
            graphShell?.resize?.();
            viewer?.resizeViewport?.();
          });
          return visible;
        };

        graphToggleButton?.addEventListener("click", () => {
          setGraphVisible(document.body.classList.contains("graph-hidden"));
        });

        const setTerminalVisible = (visible) => {
          document.body.classList.toggle("terminal-hidden", !visible);
          terminalToggleButton?.classList.toggle("active", visible);
          terminalToggleButton?.setAttribute("aria-pressed", String(visible));
          requestAnimationFrame(() => {
            graphShell?.resize?.();
            viewer?.resizeViewport?.();
            window.dispatchEvent(
              new CustomEvent("w-terminal-visibility-change", {
                detail: { visible },
              })
            );
          });
          return visible;
        };

        terminalToggleButton?.addEventListener("click", () => {
          setTerminalVisible(document.body.classList.contains("terminal-hidden"));
        });
        terminalCloseButton?.addEventListener("click", () => {
          setTerminalVisible(false);
        });

        return {
          activeTool: () => viewerToolsToPickerValue(activeTools()),
          activeTools,
          setGraphVisible,
          showGraph: () => setGraphVisible(true),
          hideGraph: () => setGraphVisible(false),
          toggleGraph: () => setGraphVisible(document.body.classList.contains("graph-hidden")),
          setTerminalVisible,
          showTerminal: () => setTerminalVisible(true),
          hideTerminal: () => setTerminalVisible(false),
          toggleTerminal: () =>
            setTerminalVisible(document.body.classList.contains("terminal-hidden")),
        };
      }

      function ensureResourcePickerOption(picker, resource) {
        if (!picker || !resource || resourcePickerHasOption(resource)) {
          return false;
        }
        const option = document.createElement("option");
        option.value = resource;
        option.textContent = resource;
        picker.appendChild(option);
        return true;
      }

      function requestedUrlResource() {
        try {
          const params = new URLSearchParams(window.location.search);
          const resource = String(params.get("resource") || "").trim();
          return isKnownResource(resource) ? resource : null;
        } catch (_error) {
          return null;
        }
      }

      async function waitForViewerResourceReady(viewer, picker, attempts = 80) {
        for (let attempt = 0; attempt < attempts; attempt += 1) {
          if (!picker?.disabled && safeViewerCurrentResource(viewer)) {
            return true;
          }
          await sleep(50);
        }
        return Boolean(safeViewerCurrentResource(viewer));
      }

      function installProjectResourcePickerSupport({ viewer, graph, agentShell }) {
        const picker = document.getElementById("resource-picker");
        if (!picker) {
          return;
        }
        picker.addEventListener("change", (event) => {
          const nextResource = String(event?.target?.value || "").trim();
          if (!isProjectResource(nextResource)) {
            return;
          }
          void agentShell?.handleResourceSwitch?.(nextResource);
          graph?.clear?.({ silent: true });
          graph?.setStatus?.(`Loading project resource ${nextResource} in the viewer.`);
        });
        const requestedResource = requestedUrlResource();
        getJson("/api/resources")
          .then(async (payload) => {
            const resources = Array.isArray(payload?.resources) ? payload.resources : [];
            await waitForViewerResourceReady(viewer, picker);
            for (const resource of resources) {
              const value = String(resource || "").trim();
              if (isProjectResource(value)) {
                ensureResourcePickerOption(picker, value);
              }
            }
            if (!isProjectResource(requestedResource) || !resourcePickerHasOption(requestedResource)) {
              return;
            }
            await waitForViewerResourceReady(viewer, picker);
            if (safeViewerCurrentResource(viewer) === requestedResource) {
              return;
            }
            picker.value = requestedResource;
            picker.dispatchEvent(new Event("change", { bubbles: true }));
          })
          .catch((error) => {
            console.warn("Project resource catalog unavailable", error);
          });
      }

      function formatResult(value) {
        if (value === undefined) {
          return "undefined";
        }
        if (typeof value === "string") {
          return value;
        }
        try {
          return JSON.stringify(value, null, 2);
        } catch (_error) {
          return String(value);
        }
      }

      function rewriteReplSource(source) {
        let rewritten = source
          .replace(REPL_GLOBAL_ASSIGN, "$1globalThis.$2 =")
          .replace(/(^|[=(,:]\s*|return\s+)ids\s*\(/gm, "$1await ids(")
          .replace(/(^|[=(,:]\s*|return\s+)queryIds\s*\(/gm, "$1await queryIds(")
          .replace(/(^|[=(,:]\s*|return\s+)query\s*\(/gm, "$1await query(")
          .replace(/(^|[=(,:]\s*|return\s+)hideQuery\s*\(/gm, "$1await hideQuery(")
          .replace(/(^|[=(,:]\s*|return\s+)showQuery\s*\(/gm, "$1await showQuery(")
          .replace(/(^|[=(,:]\s*|return\s+)selectQuery\s*\(/gm, "$1await selectQuery(");
        for (const method of GRAPH_REPL_CALLS) {
          const pattern = new RegExp(
            `(^|[=(,:]\\s*|return\\s+)graph\\\\.${method}\\s*\\(`,
            "gm"
          );
          rewritten = rewritten.replace(pattern, `$1await graph.${method}(`);
        }
        return rewritten;
      }

      function tryGetFirst(value, candidates) {
        for (const key of candidates) {
          if (value && value[key] !== undefined && value[key] !== null) {
            return value[key];
          }
        }
        return null;
      }

      function graphNodeKey(node, index = 0) {
        const raw = tryGetFirst(node, ["dbNodeId", "nodeId", "id", "key", "globalId", "semanticElementId"]);
        return raw === null ? `node-${index}` : String(raw);
      }

      function graphNodeDbNodeId(node) {
        const raw = tryGetFirst(node, ["dbNodeId", "db_node_id", "nodeId", "id"]);
        const parsed = Number.parseInt(String(raw ?? "").trim(), 10);
        return Number.isFinite(parsed) ? parsed : null;
      }

      function graphNodeSourceResource(node) {
        const raw = tryGetFirst(node, ["sourceResource", "source_resource", "resource"]);
        const resource = raw === null ? "" : String(raw).trim();
        return isKnownResource(resource) ? resource : null;
      }

      function graphEdgeKey(edge, index = 0) {
        const raw = tryGetFirst(edge, ["dbEdgeId", "edgeId", "id", "key"]);
        if (raw !== null) {
          return String(raw);
        }
        return `edge-${graphNodeKey(edge, index)}-${index}`;
      }

      function graphNodeType(node) {
        const labels = tryGetFirst(node, ["labels"]);
        if (Array.isArray(labels) && labels.length > 0) {
          const firstLabel = labels.find((value) => typeof value === "string" && value.trim().length);
          if (firstLabel) {
            return firstLabel.trim();
          }
        }
        return tryGetFirst(node, ["entity", "declaredEntity", "type", "label"]) || "IfcEntity";
      }

      function graphNodeLabel(node) {
        return graphNodeType(node);
      }

      function graphNodeEntity(node) {
        return graphNodeType(node);
      }

      function graphNodeName(node) {
        const value = tryGetFirst(node, ["name", "displayName", "title"]);
        if (typeof value !== "string") {
          return null;
        }
        const trimmed = value.trim();
        if (!trimmed) {
          return null;
        }
        const label = graphNodeLabel(node);
        return trimmed === label ? null : trimmed;
      }

      function graphNodeText(node) {
        const label = graphNodeLabel(node);
        const name = graphNodeName(node);
        return name ? `${label} · ${name}` : label;
      }

      function graphRelationshipDotTouchesSelected(node, selectedNodeId) {
        if (!selectedNodeId || !graphIsRelationshipDot(node)) {
          return false;
        }
        const selectedKey = String(selectedNodeId);
        const endpoints = graphNodeProperties(node).endpoints;
        return Array.isArray(endpoints) && endpoints.map(String).includes(selectedKey);
      }

      function graphNodeShouldForceLabel(node, ratio, selectedNodeId = null) {
        if (graphIsRelationshipNode(node)) {
          return ratio <= GRAPH_RELATIONSHIP_FORCE_LABEL_MAX_RATIO;
        }
        if (tryGetFirst(node, ["properties"])?.isSeed) {
          return ratio <= GRAPH_NODE_FORCE_LABEL_MAX_RATIO * 1.15;
        }
        return ratio <= GRAPH_NODE_FORCE_LABEL_MAX_RATIO;
      }

      function graphNodeSemanticId(node) {
        return tryGetFirst(node, ["semanticElementId", "semanticId", "globalId"]);
      }

      function graphNodeColor(node, selected = false) {
        if (selected) {
          return "#f2c879";
        }
        const entity = graphNodeEntity(node).toLowerCase();
        if (entity.includes("ifcrel")) {
          return "#9fb5d9";
        }
        if (entity.includes("project") || entity.includes("site") || entity.includes("building")) {
          return "#8ec2ff";
        }
        if (entity.includes("wall")) {
          return "#79d8b7";
        }
        if (entity.includes("slab") || entity.includes("roof")) {
          return "#f0c187";
        }
        if (entity.includes("space")) {
          return "#dba8ff";
        }
        return "#7fb1e6";
      }

      function graphIsRelationshipNode(node) {
        return graphNodeEntity(node).toLowerCase().includes("ifcrel");
      }

      function graphNodeProperties(node) {
        const properties = tryGetFirst(node, ["properties"]);
        return properties && typeof properties === "object" ? properties : {};
      }

      function graphIsRelationshipDot(node) {
        return graphIsRelationshipNode(node) && Boolean(graphNodeProperties(node).isRelationshipDot);
      }

      function graphNodeSize(node, selected = false) {
        const degree = Number(tryGetFirst(node, ["degree"])) || 0;
        if (graphIsRelationshipNode(node)) {
          return selected ? 6.5 : 4.2;
        }
        if (selected) {
          return 19;
        }
        const base = tryGetFirst(node, ["properties"])?.isSeed ? 20 : 15;
        return Math.min(28, base + Math.sqrt(Math.max(degree, 1)) * 0.7);
      }

      function graphNodeZIndex(node, selected = false) {
        if (graphIsRelationshipDot(node)) {
          return 0;
        }
        return selected ? 3 : 2;
      }

      function graphNodeRenderLabel(
        node,
        expanded = false,
        ratio = Number.POSITIVE_INFINITY,
        selectedNodeId = null
      ) {
        if (graphIsRelationshipNode(node)) {
          return ratio <= GRAPH_RELATIONSHIP_LABEL_MAX_RATIO ? graphNodeLabel(node) : "";
        }
        return expanded ? graphNodeText(node) : graphNodeLabel(node);
      }

      function graphEdgeCurvature(edge, index = 0) {
        const source = String(tryGetFirst(edge, ["source", "from", "sourceId"]) || "");
        const target = String(tryGetFirst(edge, ["target", "to", "targetId"]) || "");
        if (tryGetFirst(edge, ["isRelationshipSegment"])) {
          return relationshipSegmentFallbackCurvature(edge, source, target);
        }
        if (tryGetFirst(edge, ["isRelationshipPath"])) {
          return relationshipPathCurvature({
            source,
            target,
            edgeId: tryGetFirst(edge, ["edgeId", "id", "key"]),
            relationSiblingIndex: tryGetFirst(edge, ["relationSiblingIndex"]),
            relationSiblingCount: tryGetFirst(edge, ["relationSiblingCount"]),
          });
        }
        if (source.startsWith("rel:") || target.startsWith("rel:")) {
          return 0;
        }
        const directionSign = source < target ? 1 : -1;
        const spread = (index % 4) * 0.04;
        return directionSign * (DEFAULT_EDGE_CURVATURE * 0.68 + spread);
      }

      function graphEdgeCurvatureForPositions(edge, index = 0, positions = null) {
        const source = String(tryGetFirst(edge, ["source", "from", "sourceId"]) || "");
        const target = String(tryGetFirst(edge, ["target", "to", "targetId"]) || "");
        if (tryGetFirst(edge, ["isRelationshipSegment"])) {
          const segmentCurvature = relationshipSegmentCurvature(edge, positions);
          if (Number.isFinite(segmentCurvature)) {
            return segmentCurvature;
          }
          return relationshipSegmentFallbackCurvature(edge, source, target);
        }
        return graphEdgeCurvature(edge, index);
      }

      function graphEdgeRenderLabel(edge) {
        const label = tryGetFirst(edge, ["label", "relationshipType", "type"]);
        return label === null || label === undefined ? "" : String(label);
      }

      function relationshipEndpointDirection(edge, endpoint) {
        const raw =
          endpoint === "source"
            ? tryGetFirst(edge, ["sourceRoleDirection"])
            : tryGetFirst(edge, ["targetRoleDirection"]);
        return String(raw || "").trim();
      }

      function relationshipEndpointRole(edge, endpoint) {
        const raw =
          endpoint === "source"
            ? tryGetFirst(edge, ["sourceRole"])
            : tryGetFirst(edge, ["targetRole"]);
        return raw === null || raw === undefined ? "" : String(raw);
      }

      function relationshipPathCurvature({
        source,
        target,
        edgeId,
        relationSiblingIndex,
        relationSiblingCount,
      }) {
        const siblingCount = Math.max(1, Number(relationSiblingCount) || 1);
        const siblingIndex = Math.max(0, Number(relationSiblingIndex) || 0);
        const centeredIndex = siblingIndex - (siblingCount - 1) / 2;
        const side =
          Math.abs(centeredIndex) > 0.001
            ? Math.sign(centeredIndex)
            : stableGraphSide(edgeId || `${source}->${target}`);
        const spread = Math.abs(centeredIndex) * 0.08;
        return side * (DEFAULT_EDGE_CURVATURE * 0.62 + spread);
      }

      function relationshipSegmentFallbackCurvature(edge, source, target) {
        const relationSource = String(tryGetFirst(edge, ["relationshipSource"]) || source);
        const relationTarget = String(tryGetFirst(edge, ["relationshipTarget"]) || target);
        const parentCurvature = relationshipPathCurvature({
          source: relationSource,
          target: relationTarget,
          edgeId: tryGetFirst(edge, ["edgeId", "id", "key"]),
          relationSiblingIndex: tryGetFirst(edge, ["relationSiblingIndex"]),
          relationSiblingCount: tryGetFirst(edge, ["relationSiblingCount"]),
        });
        return parentCurvature * 0.72;
      }

      function relationshipCurveControlPoint(source, target, curvature) {
        const dx = target.x - source.x;
        const dy = target.y - source.y;
        const distance = Math.max(Math.sqrt(dx * dx + dy * dy), 0.001);
        return {
          x: (source.x + target.x) * 0.5 + (-dy / distance) * distance * curvature,
          y: (source.y + target.y) * 0.5 + (dx / distance) * distance * curvature,
        };
      }

      function curvatureForControlPoint(source, target, control) {
        const dx = target.x - source.x;
        const dy = target.y - source.y;
        const distance = Math.max(Math.sqrt(dx * dx + dy * dy), 0.001);
        const midpoint = {
          x: (source.x + target.x) * 0.5,
          y: (source.y + target.y) * 0.5,
        };
        const normal = {
          x: -dy / distance,
          y: dx / distance,
        };
        return ((control.x - midpoint.x) * normal.x + (control.y - midpoint.y) * normal.y) / distance;
      }

      function relationshipSegmentCurvature(edge, positions) {
        if (!positions) {
          return null;
        }
        const relationSourceKey = String(tryGetFirst(edge, ["relationshipSource"]) || "");
        const relationTargetKey = String(tryGetFirst(edge, ["relationshipTarget"]) || "");
        const relationNodeKey = String(tryGetFirst(edge, ["relationNodeId"]) || "");
        const sourceKey = String(tryGetFirst(edge, ["source", "from", "sourceId"]) || "");
        const targetKey = String(tryGetFirst(edge, ["target", "to", "targetId"]) || "");
        const relationSource = positions.get(relationSourceKey);
        const relationTarget = positions.get(relationTargetKey);
        const relationNode = positions.get(relationNodeKey);
        const edgeSource = positions.get(sourceKey);
        const edgeTarget = positions.get(targetKey);
        if (!relationSource || !relationTarget || !relationNode || !edgeSource || !edgeTarget) {
          return null;
        }
        const parentCurvature = relationshipPathCurvature({
          source: relationSourceKey,
          target: relationTargetKey,
          edgeId: tryGetFirst(edge, ["relationshipEdgeId", "edgeId", "id", "key"]),
          relationSiblingIndex: tryGetFirst(edge, ["relationSiblingIndex"]),
          relationSiblingCount: tryGetFirst(edge, ["relationSiblingCount"]),
        });
        const parentControl = relationshipCurveControlPoint(relationSource, relationTarget, parentCurvature);
        const segment = String(tryGetFirst(edge, ["relationshipSegment"]) || "");
        const desiredControl =
          segment === "source"
            ? {
                x: (relationSource.x + parentControl.x) * 0.5,
                y: (relationSource.y + parentControl.y) * 0.5,
              }
            : {
                x: (parentControl.x + relationTarget.x) * 0.5,
                y: (parentControl.y + relationTarget.y) * 0.5,
              };
        return curvatureForControlPoint(edgeSource, edgeTarget, desiredControl);
      }

      function stableGraphSide(value) {
        let hash = 0;
        const text = String(value || "");
        for (let index = 0; index < text.length; index += 1) {
          hash = (hash * 31 + text.charCodeAt(index)) | 0;
        }
        return hash % 2 === 0 ? 1 : -1;
      }

      function relationshipDotPosition(node, positions) {
        const properties = graphNodeProperties(node);
        if (!properties.isRelationshipDot) {
          return null;
        }
        const sourceKey = String(properties.source || "");
        const targetKey = String(properties.target || "");
        const source = positions.get(sourceKey);
        const target = positions.get(targetKey);
        if (!source || !target || sourceKey === targetKey) {
          const endpointKeys = Array.isArray(properties.endpoints)
            ? properties.endpoints.map((value) => String(value)).filter(Boolean)
            : [];
          const endpointPositions = endpointKeys
            .map((key) => positions.get(key))
            .filter((position) => position && Number.isFinite(position.x) && Number.isFinite(position.y));
          if (endpointPositions.length > 0) {
            const sum = endpointPositions.reduce(
              (accumulator, position) => ({
                x: accumulator.x + position.x,
                y: accumulator.y + position.y,
              }),
              { x: 0, y: 0 }
            );
            return {
              x: sum.x / endpointPositions.length,
              y: sum.y / endpointPositions.length,
            };
          }
          return null;
        }

        const dx = target.x - source.x;
        const dy = target.y - source.y;
        const distance = Math.max(Math.sqrt(dx * dx + dy * dy), 0.001);
        const siblingCount = Math.max(1, Number(properties.relationSiblingCount) || 1);
        const curvature = relationshipPathCurvature({
          source: sourceKey,
          target: targetKey,
          edgeId: properties.edgeId || graphNodeKey(node),
          relationSiblingIndex: properties.relationSiblingIndex,
          relationSiblingCount: siblingCount,
        });
        const offset = distance * curvature * 0.5;
        const normalX = -dy / distance;
        const normalY = dx / distance;

        return {
          x: (source.x + target.x) * 0.5 + normalX * offset,
          y: (source.y + target.y) * 0.5 + normalY * offset,
        };
      }

      function placeRelationshipDots(nodes, positions) {
        for (const [index, node] of nodes.entries()) {
          if (!graphIsRelationshipDot(node)) {
            continue;
          }
          const position = relationshipDotPosition(node, positions);
          if (position) {
            positions.set(graphNodeKey(node, index), position);
          }
        }
      }

      function graphNodePositionsFromModel(graphModel, nodes) {
        const positions = new Map();
        if (!graphModel || typeof graphModel.getNodeAttributes !== "function") {
          return positions;
        }
        for (const [index, node] of nodes.entries()) {
          const key = graphNodeKey(node, index);
          try {
            const attributes = graphModel.getNodeAttributes(key);
            if (
              attributes &&
              Number.isFinite(attributes.x) &&
              Number.isFinite(attributes.y)
            ) {
              positions.set(key, { x: attributes.x, y: attributes.y });
            }
          } catch (_error) {
            // Ignore nodes that are not in the active graph model.
          }
        }
        return positions;
      }

      function graphHoverRenderer(context, data, settings) {
        const label =
          typeof data.label === "string" && data.label.trim().length ? data.label.trim() : "";
        const nodeRadius = Math.max(data.size, 4);

        context.save();
        context.shadowOffsetX = 0;
        context.shadowOffsetY = 0;
        context.shadowBlur = 16;
        context.shadowColor = "rgba(0, 0, 0, 0.45)";

        context.beginPath();
        context.fillStyle = "rgba(243, 246, 255, 0.12)";
        context.arc(data.x, data.y, nodeRadius + 5, 0, Math.PI * 2);
        context.fill();

        context.shadowBlur = 0;
        context.beginPath();
        context.fillStyle = data.color || "#d8e4ff";
        context.arc(data.x, data.y, nodeRadius + 1.5, 0, Math.PI * 2);
        context.fill();

        if (label) {
          const fontSize = settings.labelSize;
          const font = settings.labelFont;
          const weight = settings.labelWeight;
          const paddingX = 8;
          const paddingY = 5;
          context.font = `${weight} ${fontSize}px ${font}`;
          const textWidth = context.measureText(label).width;
          const boxHeight = fontSize + paddingY * 2;
          const boxWidth = textWidth + paddingX * 2;
          const boxX = data.x + nodeRadius + 10;
          const boxY = data.y - boxHeight / 2;
          const radius = 7;

          context.beginPath();
          context.moveTo(boxX + radius, boxY);
          context.lineTo(boxX + boxWidth - radius, boxY);
          context.quadraticCurveTo(boxX + boxWidth, boxY, boxX + boxWidth, boxY + radius);
          context.lineTo(boxX + boxWidth, boxY + boxHeight - radius);
          context.quadraticCurveTo(
            boxX + boxWidth,
            boxY + boxHeight,
            boxX + boxWidth - radius,
            boxY + boxHeight
          );
          context.lineTo(boxX + radius, boxY + boxHeight);
          context.quadraticCurveTo(boxX, boxY + boxHeight, boxX, boxY + boxHeight - radius);
          context.lineTo(boxX, boxY + radius);
          context.quadraticCurveTo(boxX, boxY, boxX + radius, boxY);
          context.closePath();
          context.fillStyle = "rgba(15, 19, 32, 0.92)";
          context.strokeStyle = "rgba(141, 182, 255, 0.28)";
          context.lineWidth = 1;
          context.fill();
          context.stroke();

          context.fillStyle = "#f3f6ff";
          context.fillText(label, boxX + paddingX, data.y + fontSize / 3);
        }

        context.restore();
      }

      function graphViewportScale(viewport) {
        if (!viewport) {
          return 1;
        }
        const widthScale = viewport.width / GRAPH_REFERENCE_VIEWPORT.width;
        const heightScale = viewport.height / GRAPH_REFERENCE_VIEWPORT.height;
        return Math.max(0.55, widthScale, heightScale);
      }

      function graphNodePosition(node, index, total) {
        if (typeof node.x === "number" && typeof node.y === "number") {
          return { x: node.x, y: node.y };
        }
        const safeTotal = Math.max(total, 1);
        const angle = (index / safeTotal) * Math.PI * 2;
        const radius = Math.max(1.4, Math.sqrt(safeTotal) * 1.8);
        return {
          x: Math.cos(angle) * radius,
          y: Math.sin(angle) * radius,
        };
      }

      function computeGraphLayout(nodes, edges) {
        if (!nodes.length) {
          return new Map();
        }

        const nodeKeys = nodes.map((node, index) => graphNodeKey(node, index));
        const nodesByKey = new Map(nodeKeys.map((key, index) => [key, nodes[index]]));
        const adjacency = new Map(nodeKeys.map((key) => [key, new Set()]));
        for (const edge of edges) {
          const source = String(tryGetFirst(edge, ["source", "from", "sourceId"]));
          const target = String(tryGetFirst(edge, ["target", "to", "targetId"]));
          if (!adjacency.has(source) || !adjacency.has(target) || source === target) {
            continue;
          }
          adjacency.get(source).add(target);
          adjacency.get(target).add(source);
        }

        const positions = new Map();
        const anchors = new Map();
        const nodesByHop = new Map();
        for (const key of nodeKeys) {
          const node = nodesByKey.get(key);
          const hopDistance = Math.max(
            0,
            Number(tryGetFirst(node, ["hopDistance"]) ?? tryGetFirst(node, ["properties"])?.hopDistance ?? 0) ||
              0
          );
          if (!nodesByHop.has(hopDistance)) {
            nodesByHop.set(hopDistance, []);
          }
          nodesByHop.get(hopDistance).push(key);
        }

        for (const hopKeys of nodesByHop.values()) {
          hopKeys.sort();
        }

        for (const [hopDistance, hopKeys] of Array.from(nodesByHop.entries()).sort((a, b) => a[0] - b[0])) {
          const count = hopKeys.length;
          const ringRadius = hopDistance === 0 ? 0.9 : 2.4 + hopDistance * 2.2;
          for (const [slot, key] of hopKeys.entries()) {
            const angleOffset = hopDistance % 2 === 0 ? 0 : Math.PI / Math.max(count, 3);
            const angle = count === 1 ? 0 : (slot / count) * Math.PI * 2 + angleOffset;
            const position = count === 1 && hopDistance === 0
              ? { x: 0, y: 0 }
              : {
                  x: Math.cos(angle) * ringRadius,
                  y: Math.sin(angle) * ringRadius,
                };
            positions.set(key, position);
            anchors.set(key, { ...position });
          }
        }
        placeRelationshipDots(nodes, positions);
        for (const [key, position] of positions.entries()) {
          anchors.set(key, { ...position });
        }

        if (nodeKeys.length === 1) {
          return positions;
        }

        const iterations = Math.min(180, 90 + nodeKeys.length * 2);
        const repulsion = 0.06;
        const attraction = 0.025;
        const gravity = 0.01;
        const relationDamping = 0.9;
        const startStep = 0.34;
        const minDistance = 0.18;

        for (let iteration = 0; iteration < iterations; iteration += 1) {
          const displacement = new Map(nodeKeys.map((key) => [key, { x: 0, y: 0 }]));

          for (let leftIndex = 0; leftIndex < nodeKeys.length; leftIndex += 1) {
            const leftKey = nodeKeys[leftIndex];
            const leftPosition = positions.get(leftKey);
            for (let rightIndex = leftIndex + 1; rightIndex < nodeKeys.length; rightIndex += 1) {
              const rightKey = nodeKeys[rightIndex];
              const rightPosition = positions.get(rightKey);
              let dx = leftPosition.x - rightPosition.x;
              let dy = leftPosition.y - rightPosition.y;
              let distanceSquared = dx * dx + dy * dy;
              if (distanceSquared < minDistance * minDistance) {
                const nudge = 0.03 * (rightIndex - leftIndex + 1);
                dx += nudge;
                dy -= nudge;
                distanceSquared = dx * dx + dy * dy;
              }
              const distance = Math.sqrt(distanceSquared);
              const force = repulsion / distanceSquared;
              const fx = (dx / distance) * force;
              const fy = (dy / distance) * force;
              displacement.get(leftKey).x += fx;
              displacement.get(leftKey).y += fy;
              displacement.get(rightKey).x -= fx;
              displacement.get(rightKey).y -= fy;
            }
          }

          for (const edge of edges) {
            const sourceKey = String(tryGetFirst(edge, ["source", "from", "sourceId"]));
            const targetKey = String(tryGetFirst(edge, ["target", "to", "targetId"]));
            if (!positions.has(sourceKey) || !positions.has(targetKey)) {
              continue;
            }
            const sourcePosition = positions.get(sourceKey);
            const targetPosition = positions.get(targetKey);
            let dx = targetPosition.x - sourcePosition.x;
            let dy = targetPosition.y - sourcePosition.y;
            const distance = Math.max(Math.sqrt(dx * dx + dy * dy), minDistance);
            const sourceNode = nodesByKey.get(sourceKey);
            const targetNode = nodesByKey.get(targetKey);
            const sourceRelation = graphIsRelationshipNode(sourceNode);
            const targetRelation = graphIsRelationshipNode(targetNode);
            const desiredLength = sourceRelation || targetRelation ? 2.05 : 2.45;
            const force = (distance - desiredLength) * attraction;
            const fx = (dx / distance) * force;
            const fy = (dy / distance) * force;
            displacement.get(sourceKey).x += fx;
            displacement.get(sourceKey).y += fy;
            displacement.get(targetKey).x -= fx;
            displacement.get(targetKey).y -= fy;
          }

          const cooling = 1 - iteration / iterations;
          const stepLimit = startStep * cooling + 0.02;
          for (const key of nodeKeys) {
            const node = nodesByKey.get(key);
            const position = positions.get(key);
            const anchor = anchors.get(key);
            const delta = displacement.get(key);
            const isSeed = Boolean(tryGetFirst(node, ["properties"])?.isSeed);
            if (isSeed || graphIsRelationshipDot(node)) {
              position.x = anchor.x;
              position.y = anchor.y;
              continue;
            }
            const anchorStrength = 0.06;

            delta.x += (anchor.x - position.x) * anchorStrength;
            delta.y += (anchor.y - position.y) * anchorStrength;
            delta.x += -position.x * gravity;
            delta.y += -position.y * gravity;

            if (graphIsRelationshipNode(node)) {
              delta.x *= relationDamping;
              delta.y *= relationDamping;
            }

            const magnitude = Math.sqrt(delta.x * delta.x + delta.y * delta.y);
            if (magnitude > 0) {
              const scale = Math.min(stepLimit, magnitude) / magnitude;
              position.x += delta.x * scale;
              position.y += delta.y * scale;
            }
          }
          placeRelationshipDots(nodes, positions);
        }

        let maxRadius = 0;
        for (const { x, y } of positions.values()) {
          maxRadius = Math.max(maxRadius, Math.sqrt(x * x + y * y));
        }
        const scale = maxRadius > 0 ? 9 / maxRadius : 1;
        for (const position of positions.values()) {
          position.x *= scale;
          position.y *= scale;
        }
        placeRelationshipDots(nodes, positions);

        return positions;
      }

      async function importFirst(paths) {
        let lastError = null;
        for (const path of paths) {
          try {
            return await import(path);
          } catch (error) {
            lastError = error;
          }
        }
        throw lastError || new Error("Module import failed.");
      }

      async function loadGraphRendererModules() {
        const graphologyGlobal = globalThis.graphology;
        const SigmaGlobal = globalThis.Sigma;
        if (
          SigmaGlobal &&
          typeof SigmaGlobal === "function" &&
          graphologyGlobal &&
          typeof graphologyGlobal.Graph === "function"
        ) {
          return {
            SigmaConstructor: SigmaGlobal,
            GraphConstructor: graphologyGlobal.Graph,
          };
        }
        try {
          const [sigmaModule, graphologyModule] = await Promise.all([
            importFirst(GRAPH_RENDERER_IMPORTS.sigma),
            importFirst(GRAPH_RENDERER_IMPORTS.graphology),
          ]);
          const SigmaConstructor =
            sigmaModule.default || sigmaModule.Sigma || sigmaModule.sigma || sigmaModule;
          const GraphConstructor =
            graphologyModule.Graph || graphologyModule.default || graphologyModule;
          if (typeof SigmaConstructor !== "function" || typeof GraphConstructor !== "function") {
            throw new Error("Sigma or Graphology exports did not resolve to constructors.");
          }
          return {
            SigmaConstructor,
            GraphConstructor,
          };
        } catch (error) {
          return {
            error,
          };
        }
      }

      function createPropertyRow(label, value) {
        const fragment = document.createDocumentFragment();
        const dt = document.createElement("div");
        dt.className = "property-label";
        dt.textContent = label;
        const dd = document.createElement("div");
        dd.className = "property-value";
        dd.textContent = value;
        fragment.append(dt, dd);
        return fragment;
      }

      function createGraphShell(viewer) {
        const dom = {
          panelTabs: Array.from(document.querySelectorAll("[data-panel-tab]")),
          panelViews: Array.from(document.querySelectorAll("[data-panel-view]")),
          graphView: document.getElementById("graph-view"),
          graphFallbackList: document.getElementById("graph-fallback-list"),
          graphEmptyState: document.getElementById("graph-empty-state"),
          graphStatusLine: document.getElementById("graph-status-line"),
          graphClearButton: document.getElementById("graph-clear-button"),
          graphFocusButton: document.getElementById("graph-focus-button"),
          graphRelayoutButton: document.getElementById("graph-relayout-button"),
          graphModeButtons: Array.from(document.querySelectorAll("[data-graph-mode]")),
          viewport: document.querySelector(".viewport"),
          viewerCanvas: document.getElementById("viewer-canvas"),
          pickAnchorMarker: document.getElementById("pick-anchor-marker"),
          propertiesBalloon: document.getElementById("properties-balloon"),
          propertiesCloseButton: document.getElementById("properties-close-button"),
          propertiesGraphButton: document.getElementById("properties-graph-button"),
          propertiesTitle: document.getElementById("properties-title"),
          propertiesSubtitle: document.getElementById("properties-subtitle"),
          propertiesEmptyState: document.getElementById("properties-empty-state"),
          propertiesCoreSection: document.getElementById("properties-core-section"),
          propertiesCoreGrid: document.getElementById("properties-core-grid"),
          propertiesExtraSection: document.getElementById("properties-extra-section"),
          propertiesExtraGrid: document.getElementById("properties-extra-grid"),
          propertiesRelationsSection: document.getElementById("properties-relations-section"),
          propertiesRelationsList: document.getElementById("properties-relations-list"),
          resourcePicker: document.getElementById("resource-picker"),
          toolPicker: document.getElementById("tool-picker"),
        };

        const state = {
          activeTab: "graph",
          interactionTools: parseViewerToolValue(dom.toolPicker?.value || "none"),
          selectionOrigin: "none",
          mode: "semantic",
          nodes: [],
          edges: [],
          nodesById: new Map(),
          selectedNodeId: null,
          pickedSemanticId: null,
          pickedDbNodeId: null,
          pickedResource: null,
          pickDetailsRequestId: 0,
          activePickHasHit: false,
          propertiesBalloonDismissed: false,
          expandedNodeIds: new Set(),
          expansionPinnedNodeIds: new Set(),
          layoutPositions: new Map(),
          cameraState: null,
          controller: null,
          lastResetQuery: "",
          lastResource: safeViewerCurrentResource(viewer),
          renderer: null,
          graphModel: null,
          sigma: null,
          cameraUpdatedHandler: null,
          edgeLabelsVisible: true,
          nodeLabelsExpanded: false,
          rendererReady: false,
          rendererFailed: false,
          graphViewportSize: null,
        };

        let sigmaResizeFrame = 0;

        const waitForAnimationFrames = (count = 2) =>
          new Promise((resolve) => {
            const step = (remaining) => {
              if (remaining <= 0) {
                resolve();
                return;
              }
              requestAnimationFrame(() => step(remaining - 1));
            };
            step(count);
          });

        const graphViewportSize = () => {
          if (!dom.graphView) {
            return null;
          }
          const rect = dom.graphView.getBoundingClientRect();
          if (!Number.isFinite(rect.width) || !Number.isFinite(rect.height)) {
            return null;
          }
          return {
            width: Math.max(1, rect.width),
            height: Math.max(1, rect.height),
          };
        };

        const graphVisualRatio = (cameraRatio, viewport = state.graphViewportSize || graphViewportSize()) => {
          return cameraRatio / graphViewportScale(viewport);
        };

        const requestGraphResize = () => {
          if (sigmaResizeFrame) {
            return;
          }
          sigmaResizeFrame = requestAnimationFrame(() => {
            sigmaResizeFrame = 0;
            if (!state.sigma) {
              state.graphViewportSize = graphViewportSize();
              return;
            }
            try {
              const previousViewportSize = state.graphViewportSize;
              const nextViewportSize = graphViewportSize();
              const camera =
                typeof state.sigma.getCamera === "function" ? state.sigma.getCamera() : null;
              const previousCameraState =
                camera && typeof camera.getState === "function" ? camera.getState() : null;
              if (typeof state.sigma.resize === "function") {
                state.sigma.resize(true);
              }
              if (
                camera &&
                typeof camera.setState === "function" &&
                previousViewportSize &&
                nextViewportSize &&
                previousCameraState &&
                Number.isFinite(previousCameraState.ratio)
              ) {
                const previousScale = graphViewportScale(previousViewportSize);
                const nextScale = graphViewportScale(nextViewportSize);
                const resizeScale = nextScale / previousScale;
                if (Number.isFinite(resizeScale) && resizeScale > 0 && Math.abs(resizeScale - 1) > 0.001) {
                  camera.setState({
                    ...previousCameraState,
                    ratio: Math.max(0.05, previousCameraState.ratio * resizeScale),
                  });
                }
              }
              state.graphViewportSize = nextViewportSize;
              if (typeof state.sigma.refresh === "function") {
                state.sigma.refresh();
              } else if (typeof state.sigma.scheduleRefresh === "function") {
                state.sigma.scheduleRefresh();
              } else if (typeof state.sigma.scheduleRender === "function") {
                state.sigma.scheduleRender();
              }
            } catch (_error) {
              // Ignore transient resize errors while the panel is settling.
            }
          });
        };

        const setActiveTab = (nextTab) => {
          state.activeTab = nextTab;
          for (const tab of dom.panelTabs) {
            const active = tab.dataset.panelTab === nextTab;
            tab.classList.toggle("active", active);
            tab.setAttribute("aria-selected", String(active));
          }
          for (const view of dom.panelViews) {
            view.classList.toggle("active", view.dataset.panelView === nextTab);
          }
        };

        const hidePropertiesBalloon = () => {
          if (dom.propertiesBalloon) {
            dom.propertiesBalloon.hidden = true;
          }
          if (dom.pickAnchorMarker) {
            dom.pickAnchorMarker.hidden = true;
          }
        };

        const dismissPropertiesBalloon = () => {
          state.propertiesBalloonDismissed = true;
          hidePropertiesBalloon();
        };

        const hidePickAnchorMarker = () => {
          if (dom.pickAnchorMarker) {
            dom.pickAnchorMarker.hidden = true;
          }
        };

        const showPropertiesBalloonAtClientPoint = (
          clientX,
          clientY,
          { anchored = false, marker = false } = {}
        ) => {
          if (!dom.propertiesBalloon || !dom.viewport) {
            return;
          }
          state.propertiesBalloonDismissed = false;
          const viewportRect = dom.viewport.getBoundingClientRect();
          dom.propertiesBalloon.hidden = false;
          const balloonRect = dom.propertiesBalloon.getBoundingClientRect();
          const padding = 12;
          const sideGap = 22;
          const leftBias = 18;
          const localX = clientX - viewportRect.left;
          const localY = clientY - viewportRect.top;

          if (marker && dom.pickAnchorMarker) {
            dom.pickAnchorMarker.hidden = false;
            dom.pickAnchorMarker.style.left = `${Math.round(localX)}px`;
            dom.pickAnchorMarker.style.top = `${Math.round(localY)}px`;
          } else {
            hidePickAnchorMarker();
          }

          const maxLeft = Math.max(padding, viewportRect.width - balloonRect.width - padding);
          const maxTop = Math.max(padding, viewportRect.height - balloonRect.height - padding);
          let side = "center";
          let left = localX - balloonRect.width / 2 - leftBias;
          if (anchored) {
            const rightLeft = localX + sideGap - leftBias;
            const leftLeft = localX - sideGap - balloonRect.width - leftBias;
            const rightFits = rightLeft + balloonRect.width <= viewportRect.width - padding;
            const leftFits = leftLeft >= padding;
            const rightSpace = viewportRect.width - localX - padding;
            const leftSpace = localX - padding;
            if (rightFits || (!leftFits && rightSpace >= leftSpace)) {
              side = "right";
              left = rightLeft;
            } else {
              side = "left";
              left = leftLeft;
            }
          }
          left = clamp(left, padding, maxLeft);
          dom.propertiesBalloon.style.left = `${Math.round(left)}px`;
          const top = clamp(localY - balloonRect.height / 2, padding, maxTop);
          dom.propertiesBalloon.style.top = `${Math.round(top)}px`;
          if (anchored) {
            const rightEdge = left + balloonRect.width;
            if (localX < left) {
              side = "right";
            } else if (localX > rightEdge) {
              side = "left";
            } else {
              side = localX - left <= rightEdge - localX ? "right" : "left";
            }
          }
          dom.propertiesBalloon.dataset.side = side;
          const arrowY = clamp(localY - top, 18, balloonRect.height - 18);
          dom.propertiesBalloon.style.setProperty("--arrow-y", `${Math.round(arrowY)}px`);
        };

        const showPropertiesBalloonAtViewportCenter = () => {
          if (!dom.viewport) {
            return;
          }
          const rect = dom.viewport.getBoundingClientRect();
          showPropertiesBalloonAtClientPoint(rect.left + rect.width / 2, rect.top + rect.height / 2);
        };

        const pickRegionClientCenter = (detail) => {
          const region = detail?.region;
          if (!region || !dom.viewerCanvas) {
            return null;
          }
          const rect = dom.viewerCanvas.getBoundingClientRect();
          const surfaceWidth = Math.max(1, dom.viewerCanvas.width || rect.width);
          const surfaceHeight = Math.max(1, dom.viewerCanvas.height || rect.height);
          return {
            x: rect.left + ((Number(region.x) + Number(region.width) / 2) / surfaceWidth) * rect.width,
