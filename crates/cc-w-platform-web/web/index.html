        dom.resourcePicker?.addEventListener("change", () => {
          const nextResource = safeViewerCurrentResource(viewer);
          if (nextResource !== state.lastResource) {
            state.lastResource = nextResource;
            api.clear({ silent: true });
            setStatus(
              `Graph cleared for ${nextResource}. Use graph.reset(...) to seed the new resource.`
            );
          }
        });

        void loadGraphRendererModules().then((renderer) => {
          if (renderer.error) {
            state.rendererReady = false;
            state.rendererFailed = true;
            setStatus(
              "Sigma graph renderer is not installed in the viewer artifact yet. Using the fallback list shell for now.",
              "warn"
            );
            renderFallbackList();
            return;
          }
          state.renderer = renderer;
          state.rendererReady = true;
          state.rendererFailed = false;
          if (state.nodes.length) {
            syncGraphSurface();
          } else {
            renderFallbackList();
            setStatus(
              "Graph explorer ready. Use graph.reset(...) to seed the panel from the terminal."
            );
          }
        });

        renderProperties();
          syncActionButtons();

        if (dom.graphView) {
          if (typeof ResizeObserver !== "undefined") {
            const resizeObserver = new ResizeObserver(() => {
              requestGraphResize();
            });
            resizeObserver.observe(dom.graphView);
          } else {
            window.addEventListener("resize", requestGraphResize);
          }
        }

        return {
          api,
          resize: requestGraphResize,
          bridge: {
            installController: api.installController,
            setData: api.setData,
            setSelectedNode: api.setSelectedNode,
            setNodeProperties: api.setNodeProperties,
            setNodeDetails: api.setNodeDetails,
            setStatus: api.setStatus,
            clear: api.clear,
            snapshot: api.snapshot,
            getSelectedNode: api.getSelectedNode,
            currentResource: () => safeViewerCurrentResource(viewer),
          },
        };
      }

      function normalizedColumnName(value) {
        return String(value || "")
          .replace(/[^a-zA-Z0-9]/g, "")
          .toLowerCase();
      }

      function findCypherColumnIndex(columns, candidates) {
        const normalizedCandidates = candidates.map(normalizedColumnName);
        return columns.findIndex((column) =>
          normalizedCandidates.includes(normalizedColumnName(column))
        );
      }

      function extractDbNodeIdsFromCypherPayload(payload) {
        const columns = Array.isArray(payload?.columns) ? payload.columns : [];
        const rows = Array.isArray(payload?.rows) ? payload.rows : [];
        let nodeIdColumn = findCypherColumnIndex(columns, ["node_id", "db_node_id", "id"]);
        if (nodeIdColumn === -1 && columns.length === 1) {
          const normalized = normalizedColumnName(columns[0]);
          if (
            normalized === "id" ||
            normalized.startsWith("id") ||
            normalized.startsWith("dbnodeid") ||
            normalized.startsWith("nodeid")
          ) {
            nodeIdColumn = 0;
          }
        }
        if (nodeIdColumn === -1) {
          throw new Error(
            "Graph seed query must return a node id column, ideally `id(n) AS node_id`."
          );
        }

        const ids = [];
        for (const row of rows) {
          const raw = row?.[nodeIdColumn];
          const parsed = Number.parseInt(String(raw ?? "").trim(), 10);
          if (Number.isFinite(parsed)) {
            ids.push(parsed);
          }
        }

        return Array.from(new Set(ids));
      }

      function mapGraphSubgraphResponse(payload, options = {}) {
        const payloadResource = String(payload?.resource || "").trim();
        const sourceResource = isKnownResource(payloadResource) ? payloadResource : null;
        const rawEdges = Array.isArray(payload?.edges) ? payload.edges : [];
        const relationBuckets = new Map();
        for (const edge of rawEdges) {
          const source = String(edge.sourceDbNodeId);
          const target = String(edge.targetDbNodeId);
          const type = edge.relationshipType || edge.type || "RELATION";
          const targetLabel = target;
          if (!relationBuckets.has(source)) {
            relationBuckets.set(source, []);
          }
          if (!relationBuckets.has(target)) {
            relationBuckets.set(target, []);
          }
          relationBuckets.get(source).push({
            type,
            target,
            targetLabel,
          });
          relationBuckets.get(target).push({
            type,
            target: source,
            targetLabel: source,
          });
        }

        const relationGroups = new Map();
        const passthroughEdges = [];
        const relationshipDirectionIsKnown = (direction) =>
          direction === "from_relation" || direction === "to_relation";
        const relationGroupKey = (edge) => {
          const relationDbNodeId = tryGetFirst(edge, ["relationNodeDbNodeId", "relationNodeId"]);
          if (relationDbNodeId === null || relationDbNodeId === undefined) {
            return null;
          }
          const text = String(relationDbNodeId).trim();
          return text ? `rel:${text}` : null;
        };
        const registerRelationEndpoint = (group, edge, endpoint, endpointNodeId) => {
          const direction = relationshipEndpointDirection(edge, endpoint);
          if (!relationshipDirectionIsKnown(direction)) {
            return;
          }
          const key = String(endpointNodeId);
          const role = relationshipEndpointRole(edge, endpoint);
          const previous = group.endpoints.get(key);
          if (!previous) {
            group.endpoints.set(key, {
              nodeId: key,
              direction,
              roles: role ? new Set([role]) : new Set(),
            });
            return;
          }
          if (previous.direction !== direction) {
            previous.direction = "";
          }
          if (role) {
            previous.roles.add(role);
          }
        };
        for (const edge of rawEdges) {
          const relationshipType = String(edge.relationshipType || edge.type || "RELATION");
          const source = String(edge.sourceDbNodeId);
          const target = String(edge.targetDbNodeId);
          const groupKey = relationshipType.startsWith("IfcRel") ? relationGroupKey(edge) : null;
          if (!groupKey) {
            passthroughEdges.push(edge);
            continue;
          }
          const relationDbNodeId = tryGetFirst(edge, ["relationNodeDbNodeId", "relationNodeId"]);
          if (!relationGroups.has(groupKey)) {
            relationGroups.set(groupKey, {
              nodeId: groupKey,
              relationDbNodeId,
              relationshipType,
              edgeIds: new Set(),
              endpoints: new Map(),
            });
          }
          const group = relationGroups.get(groupKey);
          group.edgeIds.add(edge.edgeId || groupKey);
          registerRelationEndpoint(group, edge, "source", source);
          registerRelationEndpoint(group, edge, "target", target);
        }

        const nodes = (Array.isArray(payload?.nodes) ? payload.nodes : []).map((node) => {
          const rawNodeResource = String(
            tryGetFirst(node, ["sourceResource", "source_resource", "resource"]) || ""
          ).trim();
          const nodeSourceResource = isKnownResource(rawNodeResource)
            ? rawNodeResource
            : sourceResource;
          return {
            id: String(node.dbNodeId),
            dbNodeId: node.dbNodeId,
            sourceResource: nodeSourceResource,
            label: node.declaredEntity || "IfcEntity",
            name: node.name || null,
            displayName: node.displayLabel || node.name || null,
            entity: node.declaredEntity,
            globalId: node.globalId || null,
            semanticElementId: node.globalId || null,
            degree: relationBuckets.get(String(node.dbNodeId))?.length || 0,
            properties: {
              hopDistance: node.hopDistance,
              isSeed: Boolean(node.isSeed),
              sourceResource: nodeSourceResource,
            },
            relations: relationBuckets.get(String(node.dbNodeId)) || [],
          };
        });
        const nodesById = new Map(nodes.map((node) => [String(node.dbNodeId), node]));

        const labelsById = new Map(nodes.map((node) => [String(node.dbNodeId), graphNodeText(node)]));
        for (const node of nodes) {
          if (!Array.isArray(node.relations)) {
            continue;
          }
          for (const relation of node.relations) {
            relation.targetLabel = labelsById.get(String(relation.target)) || relation.targetLabel;
          }
        }

        const edges = [];
        const relationPairCounts = new Map();
        const relationPairIndexes = new Map();
        const relationGroupEntries = Array.from(relationGroups.values()).map((group) => ({
          ...group,
          endpoints: Array.from(group.endpoints.values())
            .filter((endpoint) => relationshipDirectionIsKnown(endpoint.direction))
            .sort((left, right) => left.nodeId.localeCompare(right.nodeId)),
        }));
        for (const group of relationGroupEntries) {
          if (group.endpoints.length !== 2) {
            continue;
          }
          const pairKey = `${group.endpoints[0].nodeId}->${group.endpoints[1].nodeId}`;
          relationPairCounts.set(pairKey, (relationPairCounts.get(pairKey) || 0) + 1);
        }

        for (const group of relationGroupEntries) {
          if (group.endpoints.length < 2) {
            continue;
          }
          const endpointIds = group.endpoints.map((endpoint) => endpoint.nodeId);
          const [primarySource, primaryTarget] = endpointIds;
          const selectedCandidate = String(
            options.selectedNodeId ??
              (Array.isArray(payload?.seedNodeIds) ? payload.seedNodeIds[0] : "") ??
              ""
          );
          const displaySource =
            endpointIds.includes(selectedCandidate) ? selectedCandidate : primarySource;
          const materialEndpoint = group.endpoints.find(
            (endpoint) => graphNodeEntity(nodesById.get(endpoint.nodeId)) === "IfcMaterial"
          );
          const displayTarget =
            materialEndpoint && materialEndpoint.nodeId !== displaySource
              ? materialEndpoint.nodeId
              : endpointIds.find((nodeId) => nodeId !== displaySource) || primaryTarget;
          const pairKey = group.endpoints.length === 2 ? `${primarySource}->${primaryTarget}` : "";
          const relationSiblingIndex = pairKey ? relationPairIndexes.get(pairKey) || 0 : 0;
          if (pairKey) {
            relationPairIndexes.set(pairKey, relationSiblingIndex + 1);
          }
          const relationSiblingCount = pairKey ? relationPairCounts.get(pairKey) || 1 : 1;
          const endpointHops = group.endpoints
            .map((endpoint) => Number(tryGetFirst(nodesById.get(endpoint.nodeId), ["properties"])?.hopDistance))
            .filter(Number.isFinite);
          nodes.push({
            id: group.nodeId,
            sourceResource,
            label: group.relationshipType,
            name: null,
            displayName: group.relationshipType,
            entity: group.relationshipType,
            globalId: null,
            semanticElementId: null,
            degree: group.endpoints.length,
            properties: {
              hopDistance: (endpointHops.length ? Math.min(...endpointHops) : 0) + 0.5,
              isSeed: false,
              isRelationshipDot: true,
              relationshipType: group.relationshipType,
              relationDbNodeId: group.relationDbNodeId,
              edgeId: group.nodeId,
              endpoints: endpointIds,
              source: displaySource,
              target: displayTarget,
              relationSiblingIndex,
              relationSiblingCount,
              sourceResource,
            },
            relations: group.endpoints.map((endpoint) => ({
              type: group.relationshipType,
              target: endpoint.nodeId,
              targetLabel: labelsById.get(endpoint.nodeId) || endpoint.nodeId,
            })),
          });
          for (const endpoint of group.endpoints) {
            const fromRelation = endpoint.direction === "from_relation";
            const segment =
              endpoint.nodeId === primarySource
                ? "source"
                : endpoint.nodeId === primaryTarget
                  ? "target"
                  : "endpoint";
            const role = Array.from(endpoint.roles).filter(Boolean).join(", ");
            const edgeId = `${group.nodeId}:${endpoint.nodeId}:${endpoint.direction}`;
            edges.push({
              id: edgeId,
              edgeId,
              source: fromRelation ? group.nodeId : endpoint.nodeId,
              target: fromRelation ? endpoint.nodeId : group.nodeId,
              type: "",
              label: "",
              role,
              relationshipType: group.relationshipType,
              isRelationshipSegment: true,
              relationshipSegment: segment,
              relationshipEdgeId: group.nodeId,
              relationNodeId: group.nodeId,
              relationshipSource: group.endpoints.length === 2 ? primarySource : "",
              relationshipTarget: group.endpoints.length === 2 ? primaryTarget : "",
              relationSiblingIndex,
              relationSiblingCount,
              sourceResource,
            });
          }
        }

        for (const edge of passthroughEdges) {
          const source = String(edge.sourceDbNodeId);
          const target = String(edge.targetDbNodeId);
          const relationshipType = String(edge.relationshipType || edge.type || "RELATION");
          edges.push({
            id: edge.edgeId,
            edgeId: edge.edgeId,
            source,
            target,
            sourceResource,
            type: relationshipType,
            label: relationshipType,
          });
        }

        return {
          resource: sourceResource,
          nodes,
          edges,
          seedNodeIds: Array.isArray(payload?.seedNodeIds) ? payload.seedNodeIds : [],
          selectedNodeId:
            options.selectedNodeId ??
            (Array.isArray(payload?.seedNodeIds) && payload.seedNodeIds[0] !== undefined
              ? String(payload.seedNodeIds[0])
              : null),
          truncated: Boolean(payload?.truncated),
          status:
            options.status ||
            `Graph loaded: ${nodes.length} node${nodes.length === 1 ? "" : "s"}, ${edges.length} edge${edges.length === 1 ? "" : "s"}${payload?.truncated ? " (truncated)" : ""}.`,
        };
      }

      function createGraphController(viewer) {
        const currentIfcResource = (resource = viewer.currentResource()) => {
          if (!resource || !resource.startsWith("ifc/")) {
            throw new Error(`Current resource \`${resource}\` is not an IFC model.`);
          }
          return resource;
        };

        return {
          async reset({ cypher, resource = currentIfcResource(), mode, graph }) {
            resource = currentIfcResource(resource);
            const queryPayload = await viewer.queryCypher(cypher, resource);
            const seedNodeIds = extractDbNodeIdsFromCypherPayload(queryPayload);
            if (!seedNodeIds.length) {
              await graph.clear({ silent: true });
              graph.setStatus(
                "Seed query returned no graph nodes. Return `id(n) AS node_id` to seed the explorer.",
                "warn"
              );
              return {
                nodes: [],
                edges: [],
                selectedNodeId: null,
                status:
                  "Seed query returned no graph nodes. Return `id(n) AS node_id` to seed the explorer.",
              };
            }

            const payload = await viewer.queryGraphSubgraph(
              seedNodeIds,
              {
                hops: 1,
                maxNodes: 120,
                maxEdges: 240,
                mode,
              },
              resource
            );
            return mapGraphSubgraphResponse(payload, {
              status: `Graph reset from ${seedNodeIds.length} seed node${seedNodeIds.length === 1 ? "" : "s"} in ${resource}${payload.truncated ? " (truncated)" : ""}.`,
            });
          },
          async expand({ nodeIds, resource = currentIfcResource(), mode, options = {} }) {
            resource = currentIfcResource(resource);
            const seedNodeIds = (Array.isArray(nodeIds) ? nodeIds : [nodeIds])
              .map((value) => Number.parseInt(String(value), 10))
              .filter((value) => Number.isFinite(value));

            if (!seedNodeIds.length) {
              throw new Error("Graph expansion needs at least one selected DB node id.");
            }

            const payload = await viewer.queryGraphSubgraph(
              seedNodeIds,
              {
                hops: options.hops ?? 1,
                maxNodes: options.maxNodes ?? 120,
                maxEdges: options.maxEdges ?? 240,
                mode,
              },
              resource
            );
            return mapGraphSubgraphResponse(payload, {
              selectedNodeId: String(seedNodeIds[0]),
              status: `Expanded graph around ${seedNodeIds.length} selected node${seedNodeIds.length === 1 ? "" : "s"} in ${resource}${payload.truncated ? " (truncated)" : ""}.`,
            });
          },
        };
      }

      function createReplApi(viewer, graph) {
        const currentQueryResource = (resource = viewer.currentResource()) => {
          if (!isKnownResource(resource)) {
            throw new Error(
              `Current resource \`${resource}\` is not an IFC model or project.`
            );
          }
          return resource;
        };

        const api = {
          viewer,
          graph,
          resource: () => viewer.currentResource(),
          viewState: () => viewer.viewState(),
          state: () => viewer.state(),
          setViewMode: (mode) => viewer.setViewMode(mode),
          defaultView: () => viewer.defaultView(),
          allView: () => viewer.allView(),
          setViewModeAsync: (mode) => viewer.async.setViewMode(mode),
          defaultViewAsync: () => viewer.async.defaultView(),
          allViewAsync: () => viewer.async.allView(),
          pickAt: (x, y) => viewer.pickAt(x, y),
          pickRect: (x0, y0, x1, y1) => viewer.pickRect(x0, y0, x1, y1),
          pickAtAsync: (x, y) => viewer.async.pickAt(x, y),
          pickRectAsync: (x0, y0, x1, y1) => viewer.async.pickRect(x0, y0, x1, y1),
          listIds: () => viewer.listElementIds(),
          visibleIds: () => viewer.visibleElementIds(),
          selectedIds: () => viewer.selectedElementIds(),
          selectedInstanceIds: () => viewer.selectedInstanceIds(),
          query: async (cypher, resource = currentQueryResource()) =>
            viewer.queryCypher(cypher, resource),
          queryIds: async (cypher, resource = currentQueryResource()) =>
            viewer.queryIds(cypher, resource),
          ids: async (cypher, resource = currentQueryResource()) =>
            viewer.queryIds(cypher, resource),
          hide: (ids, options = {}) => viewer.hide(ids, options),
          show: (ids, options = {}) => viewer.show(ids, options),
          select: (ids, options = {}) => viewer.select(ids, options),
          resetVisibility: (ids, options = {}) =>
            Array.isArray(ids) ? viewer.resetVisibility(ids, options) : viewer.resetAllVisibility(),
          clearSelection: () => viewer.clearSelection(),
          frame: () => viewer.frameVisible(),
          frameVisible: () => viewer.frameVisible(),
          resizeViewport: () => viewer.resizeViewport(),
          hideQuery: async (cypher, resource = currentQueryResource()) => {
            const ids = await api.queryIds(cypher, resource);
            viewer.hide(ids, { sourceResource: resource });
            return ids;
          },
          showQuery: async (cypher, resource = currentQueryResource()) => {
            const ids = await api.queryIds(cypher, resource);
            viewer.show(ids, { sourceResource: resource });
            return ids;
          },
          selectQuery: async (cypher, resource = currentQueryResource()) => {
            const ids = await api.queryIds(cypher, resource);
            viewer.select(ids, { sourceResource: resource });
            return ids;
          },
        };

        return api;
      }

      function extractAgentSessionId(payload) {
        const value = tryGetFirst(payload, ["sessionId", "id"]);
        return value === null || value === undefined ? null : String(value);
      }

      function extractAgentSchemaId(payload) {
        const value = tryGetFirst(payload, ["schemaId", "schema_id"]);
        return typeof value === "string" && value.trim() ? value.trim() : null;
      }

      function extractAgentSchemaSlug(payload) {
        const value = tryGetFirst(payload, ["schemaSlug", "schema_slug"]);
        return typeof value === "string" && value.trim() ? value.trim() : null;
      }

      function extractAgentTranscriptItems(payload) {
        const items = tryGetFirst(payload, ["transcript", "events", "items"]);
        if (Array.isArray(items)) {
          return items.map((item) =>
            item && typeof item === "object" && item.item !== undefined ? item.item : item
          );
        }
        const message = tryGetFirst(payload, ["message", "notice"]);
        return typeof message === "string" && message.trim() ? [{ kind: "notice", text: message }] : [];
      }

      function isAgentTranscriptReplayMetaText(text) {
        const lowered = String(text || "").trim().toLowerCase();
        return (
          lowered.startsWith("thinking about the request.") ||
          lowered.startsWith("opencode progress:") ||
          lowered.startsWith("ai session bound to ") ||
          lowered.startsWith("ai context switched to ") ||
          lowered.startsWith("ai context cleared.")
        );
      }

      function tryParseJsonText(text) {
        if (typeof text !== "string") {
          return null;
        }
        const trimmed = text.trim();
        if (!trimmed.startsWith("{") && !trimmed.startsWith("[")) {
          return null;
        }
        try {
          return JSON.parse(trimmed);
        } catch (_error) {
          return null;
        }
      }

      function isJsonLikeText(text) {
        const trimmed = String(text || "").trim();
        return trimmed.startsWith("{") || trimmed.startsWith("[");
      }

      function countRowsLikeResult(value) {
        if (!value || typeof value !== "object") {
          return null;
        }
        const rows = tryGetFirst(value, ["rows", "items", "results"]);
        return Array.isArray(rows) ? rows.length : null;
      }

      function summarizeAgentToolResult(toolName, item) {
        const normalizedToolName = String(toolName || "tool").trim() || "tool";
        const text = agentTextFromItem(item);
        const result = tryGetFirst(item, ["result", "output", "data", "response"]);
        const resultObject = result && typeof result === "object" ? result : null;

        if (isCypherToolName(normalizedToolName)) {
          const rowCount =
            countRowsLikeResult(resultObject) ??
            countRowsLikeResult(tryParseJsonText(text || ""));
          if (typeof rowCount === "number") {
            return `Read-only Cypher returned ${rowCount} row${rowCount === 1 ? "" : "s"}.`;
          }
          return "Read-only Cypher completed.";
        }

        if (normalizedToolName === "ifc_schema_context" && resultObject) {
          const schemaId =
            tryGetFirst(resultObject, ["schemaId", "schema_id"]) || "schema context";
          const cautions = Array.isArray(resultObject.cautions) ? resultObject.cautions.length : 0;
          const queryHabits = Array.isArray(resultObject.queryHabits)
            ? resultObject.queryHabits.length
            : 0;
          const playbooks = resultObject.queryPlaybooks &&
            typeof resultObject.queryPlaybooks === "object"
            ? Object.keys(resultObject.queryPlaybooks).length
            : 0;
          return `${schemaId} loaded with ${cautions} caution${cautions === 1 ? "" : "s"}, ${queryHabits} query habit${queryHabits === 1 ? "" : "s"}, ${playbooks} playbook${playbooks === 1 ? "" : "s"}`;
        }

        if (normalizedToolName === "ifc_model_details" && resultObject) {
          const summary = tryGetFirst(resultObject, ["summary", "message", "text"]);
          if (typeof summary === "string" && summary.trim()) {
            return summary.trim();
          }
        }

        const rowCount = countRowsLikeResult(resultObject);
        if (typeof rowCount === "number") {
          return `Result from \`${normalizedToolName}\`: returned ${rowCount} item${
            rowCount === 1 ? "" : "s"
          }.`;
        }

        if (typeof text === "string" && text.trim() && !isJsonLikeText(text)) {
          return text.trim();
        }

        return `Result from \`${normalizedToolName}\`: completed.`;
      }

      function compactAgentTranscriptItems(items) {
        if (!Array.isArray(items) || !items.length) {
          return [];
        }

        const conclusion = [...items].reverse().find((item) => {
          const text = agentTextFromItem(item);
          const kind = String(tryGetFirst(item, ["kind", "type", "event"]) || "text").toLowerCase();
          return (
            text &&
            (kind === "assistant" || kind === "message" || kind === "notice" || kind === "info") &&
            !isAgentTranscriptReplayMetaText(text)
          );
        });

        const summary = [...items].reverse().find((item) => {
          const text = agentTextFromItem(item);
          const kind = String(tryGetFirst(item, ["kind", "type", "event"]) || "text").toLowerCase();
          if (!text) {
            return false;
          }
          if (kind !== "assistant" && kind !== "system") {
            return false;
          }
          const lowered = text.trim().toLowerCase();
          return (
            lowered.startsWith("prepared ") ||
            lowered.startsWith("completed ") ||
            lowered.startsWith("applied:")
          );
        });

        const compacted = [];
        if (conclusion) {
          compacted.push(conclusion);
        }
        if (summary && summary !== conclusion) {
          compacted.push(summary);
        }
        if (compacted.length > 0) {
          return compacted;
        }

        const lastItem = items[items.length - 1];
        const lastText = agentTextFromItem(lastItem);
        if (
          lastText &&
          /^(ai session bound to |ai context switched to |ai context cleared\.)/i.test(
            lastText.trim()
          )
        ) {
          return [lastItem];
        }

        return [];
      }

      function extractAgentTurnId(payload) {
        const value = tryGetFirst(payload, ["turnId", "id"]);
        return value === null || value === undefined ? null : String(value);
      }

      function extractAgentTurnResult(payload) {
        const result = tryGetFirst(payload, ["result"]);
        return result && typeof result === "object" ? result : null;
      }

      function extractAgentTurnError(payload) {
        const error = tryGetFirst(payload, ["error"]);
        return typeof error === "string" && error.trim() ? error.trim() : null;
      }

      function formatTerminalErrorMessage(error) {
        if (error && typeof error === "object" && typeof error.message === "string") {
          const message = error.message.trim();
          if (message) {
            return message;
          }
        }
        return String(error);
      }

      function extractAgentActions(payload) {
        const actions = tryGetFirst(payload, ["actions", "uiActions", "commands"]);
        return Array.isArray(actions) ? actions : [];
      }

      function agentTextFromItem(item) {
        if (typeof item === "string") {
          return item;
        }
        if (!item || typeof item !== "object") {
          return null;
        }
        const text = tryGetFirst(item, ["text", "message", "content", "summary"]);
        if (typeof text === "string" && text.trim()) {
          return text.trim();
        }
        return null;
      }

      function isPlaceholderToolTranscript(text) {
        const lines = String(text || "")
          .split(/\r?\n/)
          .map((line) => line.trimEnd())
          .filter((line) => line.trim().length > 0);
        if (lines.length !== 1) {
          return false;
        }
        const lowered = lines[0].trim().toLowerCase();
        return (
          /:\s*tool call$/.test(lowered) || /:\s*input keys:\s*[^:]+$/.test(lowered)
        );
      }

      function looksLikeCypherLine(text) {
        return /^(MATCH|RETURN|WHERE|WITH|UNION|ORDER BY|LIMIT|OPTIONAL MATCH|CALL|UNWIND)\b/i.test(
          String(text || "").trim()
        );
      }

      function renderAgentTranscriptItems(shell, items) {
        if (!shell || !Array.isArray(items) || !items.length) {
          return;
        }

        const stopLiveStatus =
          typeof shell.stopLiveStatus === "function"
            ? (options) => shell.stopLiveStatus(options)
            : () => {};
        const writeRawLine =
          typeof shell.writeRawLine === "function"
            ? (text) => shell.writeRawLine(text)
            : (text) => shell.writeLine(text);
        const writeBlankLine =
          typeof shell.writeBlankLine === "function"
            ? () => shell.writeBlankLine()
            : () => shell.writeLine("");
        const startLiveStatus =
          typeof shell.startLiveStatus === "function"
            ? (label, options) => shell.startLiveStatus(label, options)
            : () => {};

        const state = (shell.__agentRenderState ||= {
          lastBlock: null,
        });

        const ensureBlock = (nextBlock) => {
          if (state.lastBlock && state.lastBlock !== nextBlock) {
            writeBlankLine();
          }
          state.lastBlock = nextBlock;
        };

        const startMetaStatus = (label, options = {}) => {
          ensureBlock("meta");
          startLiveStatus(label, options);
        };

        const writeMuted = (text) => {
          ensureBlock("meta");
          writeRawLine(
            terminalAnsiWrap(text, TERMINAL_MUTED_RGB, {
              dim: true,
            })
          );
        };

        const writeWarning = (text) => {
          ensureBlock("warning");
          writeRawLine(
            terminalAnsiWrap(text, TERMINAL_WARNING_RGB, {
              bold: true,
            })
          );
        };

        const writeSuccess = (text) => {
          ensureBlock("success");
          writeRawLine(
            terminalAnsiWrap(text, TERMINAL_SUCCESS_RGB, {
              bold: true,
            })
          );
        };

        const writeAssistant = (text) => {
          ensureBlock("assistant");
          const lines = String(text).split(/\r?\n/);
          for (const line of lines) {
            if (!line.trim()) {
              writeBlankLine();
              continue;
            }
            writeRawLine(terminalAssistantMarkup(line));
          }
        };

        const writeToolBlock = (text) => {
          const lines = String(text || "")
            .split(/\r?\n/)
            .map((line) => line.trimEnd());
          if (!lines.length) {
            return;
          }

          ensureBlock("tool");

          let queryStart = lines.findIndex((line) => looksLikeCypherLine(line) || line === "Cypher:");
          if (queryStart > 0 && lines[queryStart] === "Cypher:") {
            writeRawLine(
              terminalAnsiWrap(`[tool] ${lines[0]}`, TERMINAL_MUTED_RGB, { dim: true })
            );
            for (const line of lines.slice(queryStart + 1)) {
              if (!line.trim()) {
                continue;
              }
              writeRawLine(
                `${terminalAnsiWrap("    ", TERMINAL_QUERY_RGB)}${terminalAnsiWrap(
                  line,
                  TERMINAL_QUERY_RGB
                )}`
              );
            }
            return;
          }

          if (queryStart > 0) {
            writeRawLine(
              terminalAnsiWrap(`[tool] ${lines[0]}`, TERMINAL_MUTED_RGB, { dim: true })
            );
            for (const line of lines.slice(queryStart)) {
              if (!line.trim()) {
                continue;
              }
              writeRawLine(
                `${terminalAnsiWrap("    ", TERMINAL_QUERY_RGB)}${terminalAnsiWrap(
                  line,
                  TERMINAL_QUERY_RGB
                )}`
              );
            }
            return;
          }

          writeRawLine(
            terminalAnsiWrap(`[tool] ${lines[0]}`, TERMINAL_MUTED_RGB, { dim: true })
          );
          for (const line of lines.slice(1)) {
            if (!line.trim()) {
              continue;
            }
            writeRawLine(
              terminalAnsiWrap(`       ${line}`, TERMINAL_SOFT_RGB, { dim: true })
            );
          }
        };

        for (const item of items) {
          if (typeof item === "string") {
            stopLiveStatus({ persist: false });
            writeAssistant(item);
            continue;
          }
          if (!item || typeof item !== "object") {
            stopLiveStatus({ persist: false });
            writeAssistant(String(item));
            continue;
          }

          const kind = String(tryGetFirst(item, ["kind", "type", "event"]) || "text").toLowerCase();
          const text = agentTextFromItem(item);
          if (kind === "cypher" || kind === "query") {
            const query = tryGetFirst(item, ["cypher", "query"]) || text;
            if (query) {
              stopLiveStatus({ persist: false });
              writeToolBlock(`Cypher:\n${query}`);
            }
            continue;
          }
          if (kind === "tool" || kind === "tool_call") {
            if (text && isPlaceholderToolTranscript(text)) {
              continue;
            }
            stopLiveStatus({ persist: false });
            const toolName = tryGetFirst(item, ["name", "tool", "toolName"]);
            const input = tryGetFirst(item, ["input", "args", "arguments"]);
            if (text) {
              writeToolBlock(text);
            } else {
              writeToolBlock(
                input
                  ? `${toolName || "tool"}\n${formatResult(input)}`
                  : String(toolName || "tool")
              );
            }
            continue;
          }
          if (kind === "tool_result") {
            stopLiveStatus({ persist: false });
            const toolName = tryGetFirst(item, ["name", "tool", "toolName"]) || "tool result";
            writeMuted(`${toolName}: ${summarizeAgentToolResult(toolName, item)}`);
            continue;
          }
          if (kind === "error") {
            stopLiveStatus({ persist: false });
            writeWarning(text || formatResult(item));
            continue;
          }
          if (kind === "notice" || kind === "info") {
            stopLiveStatus({ persist: false });
            writeMuted(text || formatResult(item));
            continue;
          }
          if (kind === "system") {
            if (text && /^thinking about the request\.?$/i.test(text.trim())) {
              startMetaStatus("Thinking about the request");
              continue;
            }
            if (text && /^opencode progress:/i.test(text.trim())) {
              const progressText = text.trim().replace(/^opencode progress:\s*/i, "");
              const label = progressText ? `Progress: ${progressText}` : "Progress";
              startMetaStatus(label.length > 120 ? `${label.slice(0, 117)}...` : label);
              continue;
            }
            stopLiveStatus({ persist: false });
            writeMuted(text || formatResult(item));
            continue;
          }
          if (kind === "assistant" || kind === "message") {
            if (text) {
              if (/^preparing \d+ viewer action/i.test(text)) {
                startMetaStatus(text, { persistOnStop: true });
              } else if (/^prepared \d+ validated ui action/i.test(text) || /^completed \d+ read-only cypher quer/i.test(text)) {
                stopLiveStatus({ persist: false });
                writeMuted(text);
              } else if (/^applied:/i.test(text)) {
                stopLiveStatus({ persist: false });
                writeSuccess(text);
              } else {
                stopLiveStatus({ persist: false });
                writeAssistant(text);
              }
            } else {
              stopLiveStatus({ persist: false });
            }
            continue;
          }
          if (kind === "action") {
            stopLiveStatus({ persist: false });
            const actionKind = tryGetFirst(item, ["actionKind", "name", "label"]) || "action";
            writeSuccess(text ? `${actionKind}: ${text}` : String(actionKind));
            continue;
          }
          stopLiveStatus({ persist: false });
          writeAssistant(text || formatResult(item));
        }
      }

      function agentSemanticIds(action) {
        const candidates = tryGetFirst(action, [
          "semanticIds",
          "semantic_ids",
          "ids",
          "elementIds",
          "element_ids",
        ]);
        if (!Array.isArray(candidates)) {
          return [];
        }
        return Array.from(
          new Set(
            candidates
              .map((value) => String(value || "").trim())
              .filter(Boolean)
          )
        );
      }

      function agentDbNodeIds(action) {
        const candidates = tryGetFirst(action, [
          "dbNodeIds",
          "db_node_ids",
          "dbNodeId",
          "db_node_id",
          "nodeIds",
          "node_ids",
          "nodeId",
          "id",
          "ids",
        ]);
        const values = Array.isArray(candidates) ? candidates : candidates === undefined ? [] : [candidates];
        if (!values.length) {
          return [];
        }
        return Array.from(
          new Set(
            values
              .map((value) => Number.parseInt(String(value ?? ""), 10))
              .filter((value) => Number.isFinite(value))
          )
        );
      }

      function agentActionResource(action, viewer) {
        const raw = tryGetFirst(action, [
          "resource",
          "sourceResource",
          "source_resource",
          "ifcResource",
        ]);
        const resource = raw === null ? "" : String(raw).trim();
        return isKnownResource(resource) ? resource : safeViewerCurrentResource(viewer);
      }

      async function revealGraphPanelForAgentAction() {
        window.wHeader?.showGraph?.();
        await new Promise((resolve) => {
          requestAnimationFrame(() => {
            requestAnimationFrame(resolve);
          });
        });
      }

      async function applyAgentAction(action, viewer, graph) {
        if (!action || typeof action !== "object") {
          return null;
        }
        const kind = String(tryGetFirst(action, ["kind", "type", "name"]) || "").toLowerCase();
        if (!kind) {
          return null;
        }

        if (kind === "graph.set_seeds" || kind === "graph.setseeds") {
          const dbNodeIds = agentDbNodeIds(action);
          const resource = agentActionResource(action, viewer);
          if (!dbNodeIds.length || !isIfcResource(resource)) {
            return null;
          }
          await revealGraphPanelForAgentAction();
          const snapshot = await graph.snapshot();
          const payload = await viewer.queryGraphSubgraph(
            dbNodeIds,
            {
              hops: 1,
              maxNodes: 120,
              maxEdges: 240,
              mode: snapshot?.mode || "semantic",
            },
            resource
          );
          graph.setData(
            mapGraphSubgraphResponse(payload, {
              status:
                tryGetFirst(action, ["status", "message"]) ||
                `Graph set from AI with ${dbNodeIds.length} seed node${dbNodeIds.length === 1 ? "" : "s"} in ${resource}${payload?.truncated ? " (truncated)" : ""}.`,
            })
          );
          return "graph.set_seeds";
        }

        if (kind === "graph.expand") {
          const dbNodeIds = agentDbNodeIds(action);
          const resource = agentActionResource(action, viewer);
          if (!dbNodeIds.length || !isIfcResource(resource)) {
            return null;
          }
          await revealGraphPanelForAgentAction();
          const snapshot = await graph.snapshot();
          const payload = await viewer.queryGraphSubgraph(
            dbNodeIds,
            {
              hops: 1,
              maxNodes: 120,
              maxEdges: 240,
              mode: snapshot?.mode || "semantic",
            },
            resource
          );
          graph.mergeData(
            mapGraphSubgraphResponse(payload, {
              selectedNodeId: String(dbNodeIds[0]),
              status:
                tryGetFirst(action, ["status", "message"]) ||
                `Graph expanded from AI around ${dbNodeIds.length} node${dbNodeIds.length === 1 ? "" : "s"} in ${resource}${payload?.truncated ? " (truncated)" : ""}.`,
            })
          );
          return "graph.expand";
        }

        if (kind === "properties.show_node" || kind === "properties.shownode") {
          const dbNodeIds = agentDbNodeIds(action);
          const resource = agentActionResource(action, viewer);
          if (!dbNodeIds.length || !isIfcResource(resource)) {
            return null;
          }
          const dbNodeId = dbNodeIds[0];
          let selected = graph.setSelectedNode(String(dbNodeId), { revealProperties: true });
          if (!selected) {
            const snapshot = await graph.snapshot();
            const payload = await viewer.queryGraphSubgraph(
              [dbNodeId],
              {
                hops: 1,
                maxNodes: 32,
                maxEdges: 64,
                mode: snapshot?.mode || "semantic",
              },
              resource
            );
            graph.mergeData(
              mapGraphSubgraphResponse(payload, {
                selectedNodeId: String(dbNodeId),
                status:
                  tryGetFirst(action, ["status", "message"]) ||
                  `Graph loaded around node ${dbNodeId} for property inspection in ${resource}${payload?.truncated ? " (truncated)" : ""}.`,
              })
            );
          }
          const details = await viewer.queryGraphNodeProperties(dbNodeId, {}, resource);
          graph.setNodeDetails(dbNodeId, {
            properties: {
              extraProperties: details?.properties || {},
            },
            relations: Array.isArray(details?.relations)
              ? details.relations.map((relation) => {
                  const other = relation?.other || {};
                  return {
                    type: relation.relationshipType || relation.type || "RELATION",
                    target: String(
                      tryGetFirst(other, ["dbNodeId", "db_node_id", "id"]) || ""
                    ),
                    targetLabel:
                      tryGetFirst(other, [
                        "displayLabel",
                        "display_label",
                        "name",
                        "declaredEntity",
                        "declared_entity",
                      ]) || "",
                    description: relation.direction || "",
                  };
                })
              : [],
          });
          graph.setSelectedNode(String(dbNodeId), { revealProperties: true });
          return "properties.show_node";
        }

        if (kind === "elements.hide") {
          const semanticIds = semanticIdsForViewerResource(
            agentSemanticIds(action),
            safeViewerCurrentResource(viewer),
            { sourceResource: agentActionResource(action, viewer) }
          );
          if (!semanticIds.length) {
            return null;
          }
          viewer.hide(semanticIds);
          return "elements.hide";
        }

        if (kind === "elements.show") {
          const semanticIds = semanticIdsForViewerResource(
            agentSemanticIds(action),
            safeViewerCurrentResource(viewer),
            { sourceResource: agentActionResource(action, viewer) }
          );
          if (!semanticIds.length) {
            return null;
          }
          viewer.show(semanticIds);
          return "elements.show";
        }

        if (kind === "elements.select") {
          const semanticIds = semanticIdsForViewerResource(
            agentSemanticIds(action),
            safeViewerCurrentResource(viewer),
            { sourceResource: agentActionResource(action, viewer) }
          );
          if (!semanticIds.length) {
            return null;
          }
          viewer.select(semanticIds);
          return "elements.select";
        }

        if (kind === "viewer.frame_visible" || kind === "viewer.framevisible") {
          viewer.frameVisible();
          return "viewer.frame_visible";
        }

        return null;
      }

      function installAgentTerminal(viewer, graph) {
        const state = {
          sessionId: null,
          resource: null,
          schemaId: null,
          schemaSlug: null,
          bindingPromise: null,
          capabilities: null,
          capabilitiesPromise: null,
          backendId: null,
          modelId: null,
          levelId: null,
          activated: false,
        };
        const modelSelect = document.getElementById("agent-model-select");
        const levelSelect = document.getElementById("agent-level-select");
        const levelControl = levelSelect?.closest("label");

        const currentAgentResource = (resource = null) =>
          selectedAgentResource(viewer, resource);

        const selectedBackendCapability = () => {
          const backends = Array.isArray(state.capabilities?.backends)
            ? state.capabilities.backends
            : [];
          return (
            backends.find((backend) => backend.id === state.backendId) ||
            backends.find((backend) => backend.id === state.capabilities?.defaultBackendId) ||
            backends[0] ||
            null
          );
        };

        const renderCapabilitySelect = (select, options, selectedId, fallbackLabel) => {
          if (!select) {
            return;
          }
          select.innerHTML = "";
          const safeOptions = Array.isArray(options) ? options : [];
          if (!safeOptions.length) {
            const option = document.createElement("option");
            option.value = "";
            option.textContent = fallbackLabel;
            select.appendChild(option);
            select.disabled = true;
            return;
          }
          for (const item of safeOptions) {
            const option = document.createElement("option");
            option.value = String(item.id || "");
            option.textContent = String(item.label || item.id || "unknown");
            select.appendChild(option);
          }
          select.value = safeOptions.some((item) => item.id === selectedId)
            ? selectedId
            : String(safeOptions[0].id || "");
          select.disabled = safeOptions.length <= 1;
        };

        const renderAgentCapabilityControls = () => {
          const backend = selectedBackendCapability();
          if (!backend) {
            renderCapabilitySelect(modelSelect, [], null, "no models");
            renderCapabilitySelect(levelSelect, [], null, "no levels");
            if (levelControl) {
              levelControl.hidden = true;
            }
            return;
          }
          state.backendId = backend.id;
          const models = Array.isArray(backend.models) ? backend.models : [];
          state.modelId =
            models.find((item) => item.id === state.modelId)?.id ||
            state.capabilities?.defaultModelId ||
            models[0]?.id ||
            null;
          const levelsByModel =
            backend.levelsByModel && typeof backend.levelsByModel === "object"
              ? backend.levelsByModel
              : {};
          const modelLevels = Array.isArray(levelsByModel[state.modelId])
            ? levelsByModel[state.modelId]
            : [];
          const backendLevels = Array.isArray(backend.levels) ? backend.levels : [];
          const levels = modelLevels.length ? modelLevels : backendLevels;
          const defaultLevelId = levels.some((item) => item.id === state.capabilities?.defaultLevelId)
            ? state.capabilities.defaultLevelId
            : levels[Math.floor(Math.max(levels.length - 1, 0) / 2)]?.id || null;
          state.levelId =
            levels.find((item) => item.id === state.levelId)?.id ||
            defaultLevelId ||
            null;
          renderCapabilitySelect(modelSelect, models, state.modelId, "no models");
          renderCapabilitySelect(levelSelect, levels, state.levelId, "no levels");
          if (levelControl) {
            levelControl.hidden = !levels.length;
          }
        };

        const loadAgentCapabilities = async () => {
          if (state.capabilities) {
            renderAgentCapabilityControls();
            return state.capabilities;
          }
          if (!state.capabilitiesPromise) {
            state.capabilitiesPromise = getJson("/api/agent/capabilities")
              .then((payload) => {
                state.capabilities = payload;
                state.backendId = payload.defaultBackendId || state.backendId;
                state.modelId = payload.defaultModelId || state.modelId;
                state.levelId = payload.defaultLevelId || state.levelId;
                renderAgentCapabilityControls();
                return payload;
              })
              .catch((error) => {
                renderCapabilitySelect(modelSelect, [], null, "unavailable");
                renderCapabilitySelect(levelSelect, [], null, "unavailable");
                throw error;
              })
              .finally(() => {
                state.capabilitiesPromise = null;
              });
          }
          return state.capabilitiesPromise;
        };

        modelSelect?.addEventListener("change", () => {
          state.modelId = modelSelect.value || null;
          state.levelId = null;
          renderAgentCapabilityControls();
        });
        levelSelect?.addEventListener("change", () => {
          state.levelId = levelSelect.value || null;
        });

        const bindSession = async ({ resource = currentAgentResource(), force = false } = {}) => {
          if (!resource) {
            state.sessionId = null;
            state.resource = null;
            return {
              sessionId: null,
              resource: null,
              schemaId: null,
              schemaSlug: null,
              transcript: [],
            };
          }

          if (!force && state.sessionId && state.resource === resource) {
            return {
              sessionId: state.sessionId,
              resource: state.resource,
              schemaId: state.schemaId,
              schemaSlug: state.schemaSlug,
              transcript: [],
              reused: true,
            };
          }

          if (!force && state.bindingPromise) {
            return state.bindingPromise;
          }

          const previousSessionId = state.sessionId;
          const previousResource = state.resource;
          const request = postJson("/api/agent/session", {
            sessionId: previousSessionId,
            resource,
          }).then((payload) => {
            const nextSessionId = extractAgentSessionId(payload);
            if (!nextSessionId) {
              throw new Error("Agent session response did not include a session id.");
            }
            state.sessionId = nextSessionId;
            state.resource = String(tryGetFirst(payload, ["resource"]) || resource);
            state.schemaId = extractAgentSchemaId(payload);
            state.schemaSlug = extractAgentSchemaSlug(payload);
            return {
              sessionId: state.sessionId,
              resource: state.resource,
              schemaId: state.schemaId,
              schemaSlug: state.schemaSlug,
              transcript: extractAgentTranscriptItems(payload),
              created: Boolean(tryGetFirst(payload, ["created"])),
              rebound: Boolean(tryGetFirst(payload, ["rebound"])) || previousResource !== state.resource,
              previousSessionId,
            };
          });
          state.bindingPromise = request.finally(() => {
            if (state.bindingPromise === request) {
              state.bindingPromise = null;
            }
          });
          return state.bindingPromise;
        };

        let shell = null;

        const writeResourceNotice = async (resource, { forceRebind = false } = {}) => {
          if (!shell) {
            return;
          }
          if (!resource) {
            state.sessionId = null;
            state.resource = null;
            state.schemaId = null;
            state.schemaSlug = null;
            shell.writeLine("AI context cleared. Select an IFC model or project to use the agent terminal.");
            return;
          }
          try {
            const session = await bindSession({ resource, force: forceRebind });
            renderAgentTranscriptItems(shell, compactAgentTranscriptItems(session.transcript));
            shell.writeLine(
              session.schemaId
                ? `AI context switched to ${session.resource} (${session.schemaId}).`
                : `AI context switched to ${session.resource}.`
            );
          } catch (error) {
            shell.writeLine(`AI context bind failed: ${error}`);
          }
        };

        const baseShell = installLineTerminal({
          screenId: "repl-screen",
          hostId: "agent-terminal",
          introLines: [
            "AI agent terminal.",
            "The agent is bound to the active IFC project/model and can only request read-only Cypher plus validated viewer actions.",
            "Enter runs. Up/Down walks history. Ctrl+C clears the line.",
          ],
          execute: async (code, terminal) => {
            const resource = currentAgentResource();
            if (!resource) {
              terminal.writeLine("AI agent is available only while an IFC model or project is selected.");
              return TERMINAL_NO_RESULT;
            }

            await loadAgentCapabilities();
            const session = await bindSession({ resource });
            if (!session.reused) {
              renderAgentTranscriptItems(
                terminal,
                compactAgentTranscriptItems(session.transcript)
              );
            }

            const startPayload = await postJson("/api/agent/turn-start", {
              sessionId: session.sessionId,
              resource: session.resource,
              input: code,
              prompt: code,
              backendId: state.backendId,
              modelId: state.modelId,
              levelId: state.levelId,
            });

            const turnId = extractAgentTurnId(startPayload);
            if (!turnId) {
              throw new Error("Agent turn did not return a turn id.");
            }

            const startedSessionId = extractAgentSessionId(startPayload);
            if (startedSessionId) {
              state.sessionId = startedSessionId;
            }
            state.resource = String(
              tryGetFirst(startPayload, ["resource"]) || session.resource || resource
            );
            state.schemaId = extractAgentSchemaId(startPayload) || session.schemaId || state.schemaId;
            state.schemaSlug = extractAgentSchemaSlug(startPayload) || session.schemaSlug || state.schemaSlug;
            state.backendId = String(tryGetFirst(startPayload, ["backendId"]) || state.backendId || "");
            state.modelId = String(tryGetFirst(startPayload, ["modelId"]) || state.modelId || "");
            state.levelId = String(tryGetFirst(startPayload, ["levelId"]) || state.levelId || "");
            renderAgentCapabilityControls();

            let afterSeq = 0;
            let resultPayload = null;
            while (true) {
              const pollPayload = await postJson("/api/agent/turn-poll", {
                turnId,
                afterSeq,
              });
              const events = extractAgentTranscriptItems(pollPayload);
              if (Array.isArray(pollPayload?.events) && pollPayload.events.length) {
                const lastEvent = pollPayload.events[pollPayload.events.length - 1];
                const seq = Number(lastEvent?.seq);
                if (Number.isFinite(seq)) {
                  afterSeq = Math.max(afterSeq, seq);
                }
              }
              renderAgentTranscriptItems(terminal, events);
              if (Boolean(tryGetFirst(pollPayload, ["done"]))) {
                const pollError = extractAgentTurnError(pollPayload);
                if (pollError) {
                  throw new Error(pollError);
                }
                resultPayload = extractAgentTurnResult(pollPayload);
                break;
              }
              await sleep(150);
            }

            if (!resultPayload) {
              return TERMINAL_NO_RESULT;
            }

            const nextSessionId = extractAgentSessionId(resultPayload);
            if (nextSessionId) {
              state.sessionId = nextSessionId;
            }
            state.resource = String(
              tryGetFirst(resultPayload, ["resource"]) || session.resource || resource
            );
            state.schemaId = extractAgentSchemaId(resultPayload) || session.schemaId || state.schemaId;
            state.schemaSlug = extractAgentSchemaSlug(resultPayload) || session.schemaSlug || state.schemaSlug;

            const actions = extractAgentActions(resultPayload);
            const appliedKinds = [];
            for (const action of actions) {
              try {
                const appliedKind = await applyAgentAction(action, viewer, graph);
                if (appliedKind) {
                  appliedKinds.push(appliedKind);
                }
              } catch (error) {
                terminal.writeRawLine(
                  terminalAnsiWrap(`action failed: ${error}`, TERMINAL_WARNING_RGB, {
                    bold: true,
                  })
                );
              }
            }
            if (appliedKinds.length) {
              terminal.writeRawLine(
                terminalAnsiWrap(`applied: ${appliedKinds.join(", ")}`, TERMINAL_SUCCESS_RGB, {
                  bold: true,
                })
              );
            }
            return TERMINAL_NO_RESULT;
          },
        });

        if (!baseShell) {
          return null;
        }

        void loadAgentCapabilities().catch((error) => {
          console.warn("AI capabilities unavailable", error);
        });

        shell = {
          ...baseShell,
          activate() {
            baseShell.activate();
            void loadAgentCapabilities().catch((error) => {
              baseShell.writeLine(`AI capabilities unavailable: ${formatTerminalErrorMessage(error)}`);
            });
            if (!state.activated) {
              state.activated = true;
              const resource = currentAgentResource();
              if (resource) {
                void bindSession({ resource })
                  .then((session) => {
                    renderAgentTranscriptItems(
                      baseShell,
                      compactAgentTranscriptItems(session.transcript)
                    );
                  })
                  .catch((error) => {
                    baseShell.writeLine(`AI context bind failed: ${error}`);
                  });
              }
            }
          },
          async handleResourceSwitch(resource = null) {
            const nextResource = currentAgentResource(resource);
            await writeResourceNotice(nextResource, { forceRebind: true });
          },
        };

        return shell;
      }

      function installLineTerminal({ screenId, hostId, introLines, execute }) {
        const screen = document.getElementById(screenId);
        const host = document.getElementById(hostId);
        if (!screen || !host) {
          return null;
        }

        const term = new Terminal({
          allowTransparency: false,
          convertEol: true,
          cursorBlink: true,
          cursorStyle: "block",
          fontFamily:
            'ui-monospace, SFMono-Regular, SF Mono, Menlo, Monaco, Consolas, "Liberation Mono", monospace',
          fontSize: 12,
          lineHeight: 1.35,
          scrollback: 2000,
          smoothScrollDuration: 0,
          theme: {
            background: TERMINAL_SURFACE_BACKGROUND,
            foreground: "#d7deee",
            cursor: "#8db6ff",
            cursorAccent: TERMINAL_SURFACE_BACKGROUND,
            selectionBackground: "rgba(141, 182, 255, 0.24)",
            black: TERMINAL_SURFACE_BACKGROUND,
            red: "#ff9d8a",
            green: "#8fe0a2",
            yellow: "#f2c879",
            blue: "#8db6ff",
            magenta: "#d4a7ff",
            cyan: "#7edfe6",
            white: "#d7deee",
            brightBlack: "#4e576c",
            brightRed: "#ffb8aa",
            brightGreen: "#a9efb9",
            brightYellow: "#f7dca0",
            brightBlue: "#abc8ff",
            brightMagenta: "#dfbeff",
            brightCyan: "#9be9ef",
            brightWhite: "#f3f6ff",
          },
        });
        const fitAddon = new FitAddon();
        term.loadAddon(fitAddon);
        term.open(host);
        let shellApi = null;
        try {
          term.resize(120, 18);
        } catch (_error) {
          // Fall back to fit-based sizing below.
        }

        const fitTerminal = () => {
          if (host.hidden || !host.classList.contains("active")) {
            return;
          }
          try {
            fitAddon.fit();
          } catch (_error) {
            // Ignore pre-layout fit attempts; resize events will catch up.
          }
          if ((term.cols <= 0 || term.rows <= 0) && typeof term.resize === "function") {
            try {
              term.resize(120, 18);
            } catch (_error) {
              // Keep the terminal alive even if manual resize is unavailable.
            }
          }
        };

        let running = false;
        let currentLine = "";
        let cursorIndex = 0;
        const history = [];
        let historyIndex = 0;
        let historyDraft = "";
        let promptBooted = false;
        let liveStatus = null;

        const setRunning = (next) => {
          running = next;
          screen.classList.toggle("running", next);
        };

        const renderPromptLine = () => {
          term.write("\r\x1b[2K");
          term.write(terminalPromptMarkup());
          if (currentLine.length) {
            term.write(sanitizeTerminalText(currentLine));
          }
          const trailing = currentLine.length - cursorIndex;
          if (trailing > 0) {
            term.write(`\x1b[${trailing}D`);
          }
        };

        const replaceCurrentLine = (next) => {
          currentLine = next;
          cursorIndex = currentLine.length;
          renderPromptLine();
        };

        const showPrompt = () => {
          renderPromptLine();
        };

        const stopLiveStatus = ({ persist, finalText = null } = {}) => {
          if (!liveStatus) {
            return;
          }
          window.clearInterval(liveStatus.timer);
          const shouldPersist =
            typeof persist === "boolean" ? persist : Boolean(liveStatus.persistOnStop);
          const settledText = finalText || liveStatus.finalTextOnStop || liveStatus.label;
          const settledFrame = liveStatus.frame || TERMINAL_ACTIVITY_FRAMES[0];
          liveStatus = null;
          term.write("\r\x1b[2K");
          if (shouldPersist && settledText) {
            terminalWriteRawLine(
              term,
              terminalAnsiWrap(`${settledFrame} ${settledText}`, TERMINAL_MUTED_RGB, {
                dim: true,
              })
            );
          } else if (!running) {
            showPrompt();
          }
        };

        const renderLiveStatus = () => {
          if (!liveStatus) {
            return;
          }
          liveStatus.frame =
            TERMINAL_ACTIVITY_FRAMES[liveStatus.frameIndex % TERMINAL_ACTIVITY_FRAMES.length];
          liveStatus.frameIndex += 1;
          term.write("\r\x1b[2K");
          term.write(
            terminalAnsiWrap(`${liveStatus.frame} ${liveStatus.label}`, TERMINAL_MUTED_RGB, {
              dim: true,
            })
          );
        };

        const startLiveStatus = (label, { persistOnStop = false, finalTextOnStop = null } = {}) => {
          if (!promptBooted) {
            bootPrompt();
          }
          stopLiveStatus({ persist: false });
          liveStatus = {
            label: String(label || "Working..."),
            persistOnStop,
            finalTextOnStop,
            frameIndex: 0,
            frame: TERMINAL_ACTIVITY_FRAMES[0],
            timer: 0,
          };
          renderLiveStatus();
          liveStatus.timer = window.setInterval(renderLiveStatus, 120);
        };

        const writeBlankLine = () => {
          stopLiveStatus();
          term.write("\r\x1b[2K");
          terminalWriteRawLine(term, "");
          if (!running) {
            showPrompt();
          }
        };

        const writeRawLine = (text = "") => {
          if (!promptBooted) {
            bootPrompt();
          }
          stopLiveStatus();
          term.write("\r\x1b[2K");
          terminalWriteRawLine(term, text);
          if (!running) {
            showPrompt();
          }
        };

        const writeLine = (text = "") => {
          writeRawLine(sanitizeTerminalText(text));
        };

        const writeLines = (lines = []) => {
          for (const line of lines) {
            writeLine(line);
          }
        };

        const bootPrompt = () => {
          fitTerminal();
          if (promptBooted) {
            term.focus();
            return;
          }
          for (const line of introLines) {
            terminalWriteLine(term, line);
          }
          term.write("\r\n");
          promptBooted = true;
          showPrompt();
          term.focus();
        };

        if (typeof ResizeObserver !== "undefined") {
          const resizeObserver = new ResizeObserver(() => {
            fitTerminal();
            if (!promptBooted) {
              requestAnimationFrame(() => bootPrompt());
            }
          });
          resizeObserver.observe(host);
        } else {
          window.addEventListener("resize", () => {
            fitTerminal();
            if (!promptBooted) {
              requestAnimationFrame(() => bootPrompt());
            }
          });
        }

        const moveHistory = (direction) => {
          if (!history.length) {
            return;
          }

          if (historyIndex === history.length) {
            historyDraft = currentLine;
          }
          historyIndex = Math.max(0, Math.min(history.length, historyIndex + direction));
          replaceCurrentLine(
            historyIndex === history.length ? historyDraft : history[historyIndex]
          );
        };

        const resetLineState = () => {
          currentLine = "";
          cursorIndex = 0;
          historyIndex = history.length;
          historyDraft = "";
        };

        const runCurrentCommand = async (code) => {
          if (running) {
            return;
          }
          if (!code.trim()) {
            term.write("\r\n");
            showPrompt();
            return;
          }

          if (history[history.length - 1] !== code) {
            history.push(code);
          }
          term.write("\r\n");
          resetLineState();
          setRunning(true);
          try {
            const result = await execute(
              code,
              shellApi || {
                term,
                writeLine,
                writeLines,
                writeRawLine,
                writeBlankLine,
                startLiveStatus,
                stopLiveStatus,
                focus: () => term.focus(),
              }
            );
            if (result !== TERMINAL_NO_RESULT) {
              terminalWriteLine(term, formatResult(result ?? "ok"));
            }
          } catch (error) {
            stopLiveStatus();
            terminalWriteRawLine(
              term,
              terminalAnsiWrap(formatTerminalErrorMessage(error), TERMINAL_WARNING_RGB, {
                bold: true,
              })
            );
            console.error(error);
          } finally {
            stopLiveStatus();
            setRunning(false);
            showPrompt();
            term.focus();
          }
        };

        term.onData((data) => {
          if (!promptBooted) {
            bootPrompt();
          }
          if (data === "\u001b[A" || data === "\u001bOA") {
            moveHistory(-1);
            return;
          }
          if (data === "\u001b[B" || data === "\u001bOB") {
            moveHistory(1);
            return;
          }

          if (running) {
            return;
          }

          if (data === "\r") {
            void runCurrentCommand(currentLine);
            return;
          }

          if (data === "\u0003") {
            term.write("\r\x1b[2K");
            term.write(`${terminalPromptMarkup()}${sanitizeTerminalText(currentLine)}^C\r\n`);
            resetLineState();
            showPrompt();
            return;
          }

          if (data === "\u0001" || data === "\u001b[H" || data === "\u001bOH") {
            cursorIndex = 0;
            renderPromptLine();
            return;
          }

          if (data === "\u0005" || data === "\u001b[F" || data === "\u001bOF") {
            cursorIndex = currentLine.length;
            renderPromptLine();
            return;
          }

          if (data === "\u001b[D" || data === "\u001bOD") {
            if (cursorIndex > 0) {
              cursorIndex -= 1;
              renderPromptLine();
            }
            return;
          }

          if (data === "\u001b[C" || data === "\u001bOC") {
            if (cursorIndex < currentLine.length) {
              cursorIndex += 1;
              renderPromptLine();
            }
            return;
          }

          if (data === "\u007F") {
            if (cursorIndex > 0) {
              currentLine =
                currentLine.slice(0, cursorIndex - 1) + currentLine.slice(cursorIndex);
              cursorIndex -= 1;
              renderPromptLine();
            }
            return;
          }

          if (data === "\u001b[3~") {
            if (cursorIndex < currentLine.length) {
              currentLine =
                currentLine.slice(0, cursorIndex) + currentLine.slice(cursorIndex + 1);
              renderPromptLine();
            }
            return;
          }

          for (const ch of data) {
            if (ch === "\n") {
              continue;
            }
            if (ch === "\r") {
              void runCurrentCommand(currentLine);
              return;
            }
            if (ch < " " && ch !== "\t") {
              continue;
            }
            currentLine =
              currentLine.slice(0, cursorIndex) + ch + currentLine.slice(cursorIndex);
            cursorIndex += ch.length;
            renderPromptLine();
          }
        });

        term.onKey(() => {
          if (document.activeElement !== term.textarea) {
            term.focus();
          }
        });

        host.addEventListener("click", () => term.focus());
        if (host.classList.contains("active")) {
          requestAnimationFrame(() => bootPrompt());
          setTimeout(() => bootPrompt(), 50);
          setTimeout(() => bootPrompt(), 180);
        }

        shellApi = {
          resize: fitTerminal,
          focus: () => term.focus(),
          writeLine,
          writeLines,
          writeRawLine,
          writeBlankLine,
          startLiveStatus,
          stopLiveStatus,
          activate: () => {
            host.hidden = false;
            host.classList.add("active");
            requestAnimationFrame(() => {
              fitTerminal();
              bootPrompt();
            });
          },
          deactivate: () => {
            host.classList.remove("active");
            host.hidden = true;
          },
        };
        return shellApi;
      }

      function installRepl(replApi) {
        return installLineTerminal({
          screenId: "repl-screen",
          hostId: "repl-terminal",
          introLines: [
            'resource(), allView(), defaultView(), viewState(), state(), pickAt(x,y), pickRect(x0,y0,x1,y1), query(...), ids(...), hide([...]), show([...]), select([...]), graph.reset(...), frame()',
            'Example: graph.reset("MATCH (p:IfcProject) RETURN id(p) AS node_id LIMIT 1");',
            'Example: var walls = ids("MATCH (w:IfcWall) RETURN w.GlobalId AS global_id LIMIT 8"); hide(walls);',
            "Enter runs. Up/Down walks history. Ctrl+C clears the line.",
          ],
          execute: async (code) => {
            const rewritten = rewriteReplSource(code);
            const fn = new AsyncFunction(
              "api",
              "window",
              "document",
              `"use strict"; const { viewer, graph, resource, viewState, state, setViewMode, defaultView, allView, setViewModeAsync, defaultViewAsync, allViewAsync, pickAt, pickRect, pickAtAsync, pickRectAsync, listIds, visibleIds, selectedIds, selectedInstanceIds, query, queryIds, ids, hide, show, select, resetVisibility, clearSelection, frame, frameVisible, hideQuery, showQuery, selectQuery } = api; return (async () => { ${rewritten} })();`
            );
            return fn(replApi, window, document);
          },
        });
      }

      function installTerminalToolSelector(terminals) {
        const buttons = Array.from(document.querySelectorAll("[data-terminal-tool]"));
        const terminalMap = new Map(
          terminals
            .map((terminal) => [terminal.id, terminal.shell])
            .filter((entry) => entry[1])
        );
        let activeTool = terminals.find((terminal) => terminal.defaultActive)?.id || terminals[0]?.id || null;

        const setActiveTool = (nextTool) => {
          if (!terminalMap.has(nextTool)) {
            return;
          }
          activeTool = nextTool;
          for (const [toolId, shell] of terminalMap.entries()) {
            if (toolId === nextTool) {
              shell.activate();
            } else {
              shell.deactivate();
            }
          }
          for (const button of buttons) {
            const active = button.dataset.terminalTool === nextTool;
            button.classList.toggle("active", active);
            button.setAttribute("aria-selected", String(active));
          }
        };

        for (const button of buttons) {
          button.addEventListener("click", () => {
            setActiveTool(button.dataset.terminalTool);
          });
        }

        if (activeTool) {
          setActiveTool(activeTool);
        }

        return {
          activeTool: () => activeTool,
          resize: () => terminalMap.get(activeTool)?.resize(),
          focus: () => terminalMap.get(activeTool)?.focus(),
          setActiveTool,
        };
      }

      init()
        .then(() => {
          const viewer = createViewerApi();
          const graphShell = createGraphShell(viewer);
          graphShell.api.installController(createGraphController(viewer));
          const headerControls = installHeaderControls(viewer, graphShell);
          const repl = createReplApi(viewer, graphShell.api);
          window.wViewer = viewer;
          window.viewer = viewer;
          window.wHeader = headerControls;
          window.wGraph = graphShell.api;
          window.graph = graphShell.api;
          window.wGraphShell = graphShell.bridge;
          window.__wGraphShell = graphShell.bridge;
          window.query = repl.query;
          window.queryIds = repl.queryIds;
          window.ids = repl.ids;
          window.viewState = repl.viewState;
          window.state = repl.state;
          window.setViewMode = repl.setViewMode;
          window.defaultView = repl.defaultView;
          window.allView = repl.allView;
          window.setViewModeAsync = repl.setViewModeAsync;
          window.defaultViewAsync = repl.defaultViewAsync;
          window.allViewAsync = repl.allViewAsync;
          window.pickAt = repl.pickAt;
          window.pickRect = repl.pickRect;
          window.pickAtAsync = repl.pickAtAsync;
          window.pickRectAsync = repl.pickRectAsync;
          window.hideQuery = repl.hideQuery;
          window.showQuery = repl.showQuery;
          window.selectQuery = repl.selectQuery;
          window.resource = repl.resource;
          window.listIds = repl.listIds;
          window.visibleIds = repl.visibleIds;
          window.selectedIds = repl.selectedIds;
          window.selectedInstanceIds = repl.selectedInstanceIds;
          window.hide = repl.hide;
          window.show = repl.show;
          window.select = repl.select;
          window.resetVisibility = repl.resetVisibility;
          window.clearSelection = repl.clearSelection;
          window.frame = repl.frame;
          const replShell = installRepl(repl);
          const agentShell = installAgentTerminal(viewer, graphShell.api);
          installProjectResourcePickerSupport({
            viewer,
            graph: graphShell.api,
            agentShell,
          });
          const terminalShell = installTerminalToolSelector([
            { id: "ai", shell: agentShell, defaultActive: true },
            { id: "js", shell: replShell },
          ]);
          window.addEventListener("w-terminal-visibility-change", () => {
            terminalShell?.resize();
            viewer.resizeViewport();
            graphShell.resize();
          });
          document.getElementById("resource-picker")?.addEventListener("change", (event) => {
            const nextResource = event?.target?.value;
            void agentShell?.handleResourceSwitch?.(nextResource);
          });
          installLayoutResizers({
            onSidePanelResize: () => {
              graphShell.resize();
              viewer.resizeViewport();
            },
            onTerminalResize: () => {
              terminalShell?.resize();
              viewer.resizeViewport();
            },
          });
        })
        .catch((error) => {
          const status = document.getElementById("status-line");
          if (status) {
            status.textContent = `w web viewer failed: ${error}`;
          }
          console.error(error);
        });
    </script>
  </body>
</html>
